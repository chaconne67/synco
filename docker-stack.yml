version: "3.8"

services:
  app:
    image: synco-app:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://synco:synco@db:5432/synco
    depends_on:
      - db
    networks:
      - synco_net
      - Moa_net
    deploy:
      replicas: 1
      update_config:
        order: start-first

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: synco
      POSTGRES_PASSWORD: synco
      POSTGRES_DB: synco
    volumes:
      - synco_db_data:/var/lib/postgresql/data
    networks:
      - synco_net
    deploy:
      replicas: 1

volumes:
  synco_db_data:

networks:
  synco_net:
    driver: overlay
  Moa_net:
    external: true
