services:
  nginx:
    image: __NGINX_IMAGE__
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/www/certbot:/var/www/certbot:ro
      - /etc/letsencrypt:/cert:ro
    environment:
      TZ: Asia/Seoul
    networks:
      - net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == moa-svr
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        order: stop-first

  synco_db:
    image: pgvector/pgvector:pg16
    env_file: /home/chaconne/synco-deploy/synco/.env.prod
    volumes:
      - /mnt/pgdata/prod:/var/lib/postgresql/data
    environment:
      TZ: Asia/Seoul
    networks:
      - net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == moa-svr
      restart_policy:
        condition: on-failure

  synco_app:
    image: __APP_IMAGE__
    env_file: /home/chaconne/synco-deploy/synco/.env.prod
    volumes:
      - /home/chaconne/synco-deploy/synco/.secrets:/app/.secrets:ro
      - /home/chaconne/synco-deploy/synco/.claude:/root/.claude:ro
      - /home/chaconne/synco-deploy/synco/.claude.json:/root/.claude.json:ro
      - /home/chaconne/synco-deploy/synco/runtime/logs:/app/logs
    environment:
      TZ: Asia/Seoul
    command: >-
      sh -c "python manage.py migrate --noinput &&
             exec gunicorn main.wsgi:application --bind 0.0.0.0:8000"
    networks:
      - net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == moa-svr
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        order: stop-first

networks:
  net:
    driver: overlay
