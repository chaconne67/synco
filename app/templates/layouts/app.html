{% extends "layouts/base.html" %}

{% block body %}
<div class="max-w-md mx-auto bg-white min-h-screen shadow-sm relative pb-20">
    <!-- Header -->
    <header class="flex items-center justify-between px-4 py-3 border-b border-gray-100">
        <h1 class="text-xl font-bold text-gray-900">synco</h1>
        <div class="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center text-sm text-gray-500">
            {{ user.name[0] if user and user.name else '?' }}
        </div>
    </header>

    <!-- Content -->
    <main class="px-4 py-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white border-t border-gray-100 px-2 py-2">
        <div class="flex justify-around">
            <a href="/dashboard" class="flex flex-col items-center gap-0.5 text-xs {% if active_nav == 'briefing' %}text-primary font-semibold{% else %}text-gray-400{% endif %}"
               hx-get="/dashboard" hx-target="main" hx-push-url="true">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a8 8 0 100 16 8 8 0 000-16zm1 11H9v-2h2v2zm0-4H9V5h2v4z"/></svg>
                브리핑
            </a>
            <a href="/contacts" class="flex flex-col items-center gap-0.5 text-xs {% if active_nav == 'contacts' %}text-primary font-semibold{% else %}text-gray-400{% endif %}"
               hx-get="/contacts" hx-target="main" hx-push-url="true">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 10a4 4 0 100-8 4 4 0 000 8zm-7 8a7 7 0 0114 0H3z"/></svg>
                연락처
            </a>
            <a href="/matches" class="flex flex-col items-center gap-0.5 text-xs {% if active_nav == 'matching' %}text-primary font-semibold{% else %}text-gray-400{% endif %}"
               hx-get="/matches" hx-target="main" hx-push-url="true">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M8 5a3 3 0 00-3 3v1H4a1 1 0 00-1 1v6a1 1 0 001 1h12a1 1 0 001-1v-6a1 1 0 00-1-1h-1V8a3 3 0 00-3-3H8zm2 8a2 2 0 110-4 2 2 0 010 4z"/></svg>
                매칭
            </a>
            <a href="/settings" class="flex flex-col items-center gap-0.5 text-xs {% if active_nav == 'settings' %}text-primary font-semibold{% else %}text-gray-400{% endif %}">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
                설정
            </a>
        </div>
    </nav>
</div>
{% endblock %}
