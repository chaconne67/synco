<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#5B6ABF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>{% block title %}synco{% endblock %}</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/images/icon-192.png">
    <link rel="apple-touch-icon" href="/static/images/icon-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#5B6ABF',
                        'primary-dark': '#4A59AE',
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen">
    {% block body %}{% endblock %}

    <script>
        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js');
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
