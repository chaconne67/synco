{% extends "layouts/app.html" %}

{% block content %}
<!-- Greeting -->
<div class="mb-6">
    <p class="text-lg">
        <strong class="text-xl">{{ user.name }} {{ 'FC' if user.role == 'fc' else '대표' }}님, 좋은 아침이에요.</strong>
    </p>
    <p class="text-gray-500 text-sm mt-1">오늘의 인사이트가 준비되었습니다.</p>
</div>

<!-- AI Briefing Card -->
<div class="bg-gradient-to-br from-indigo-50 to-blue-50 rounded-2xl border border-indigo-100 p-5 mb-4">
    <div class="flex items-center gap-2 mb-4">
        <div class="w-2 h-2 rounded-full bg-primary"></div>
        <span class="text-xs font-semibold text-primary tracking-wider">AI BRIEFING</span>
    </div>

    <div class="text-center py-8 text-gray-400 text-sm">
        연락처를 등록하면 AI 브리핑이 생성됩니다
    </div>
</div>

<!-- Quick Action -->
<div class="bg-gray-900 text-white rounded-2xl p-5 mb-6">
    <div class="text-[10px] text-gray-400 tracking-wider mb-2">시작하기</div>
    <p class="text-sm leading-relaxed">첫 번째 연락처를 등록해보세요. AI가 기업 분석과 접근 전략을 제안합니다.</p>
    <a href="/contacts" hx-get="/contacts" hx-target="main" hx-push-url="true"
       class="inline-block mt-3 px-5 py-2 bg-primary text-white rounded-lg text-sm font-semibold">
        연락처 등록
    </a>
</div>

<!-- Recent Contacts (empty state) -->
<div class="text-xs font-semibold text-gray-400 tracking-wider mb-3">최근 연락처</div>
<div class="text-center py-8 text-gray-400 text-sm">
    아직 등록된 연락처가 없습니다
</div>
{% endblock %}
