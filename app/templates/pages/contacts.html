{% extends "layouts/app.html" %}

{% block content %}
<div class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-bold">연락처</h2>
    <button onclick="document.getElementById('add-modal').classList.remove('hidden')"
            class="px-4 py-2 bg-primary text-white text-sm font-semibold rounded-xl">
        + 추가
    </button>
</div>

<!-- Contact List -->
<div id="contact-list" class="space-y-2">
    {% if contacts %}
        {% for contact in contacts %}
            {% include "components/contact_card.html" %}
        {% endfor %}
    {% else %}
        <div class="text-center py-12 text-gray-400 text-sm">
            아직 등록된 연락처가 없습니다.<br>
            위의 + 추가 버튼으로 시작해보세요.
        </div>
    {% endif %}
</div>

<!-- Add Contact Modal -->
<div id="add-modal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-end justify-center">
    <div class="w-full max-w-md bg-white rounded-t-2xl p-6 animate-slide-up">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-bold">연락처 추가</h3>
            <button onclick="document.getElementById('add-modal').classList.add('hidden')"
                    class="text-gray-400 text-2xl">&times;</button>
        </div>

        <form hx-post="/contacts" hx-target="#contact-list" hx-swap="afterbegin"
              hx-on::after-request="document.getElementById('add-modal').classList.add('hidden'); this.reset()">
            <div class="space-y-3">
                <input name="name" placeholder="이름 *" required
                       class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-primary">
                <input name="phone" placeholder="전화번호" type="tel"
                       class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-primary">
                <input name="company_name" placeholder="회사명"
                       class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-primary">
                <select name="industry"
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-primary text-gray-500">
                    <option value="">업종 선택</option>
                    <option value="제조/생산">제조/생산</option>
                    <option value="유통/물류">유통/물류</option>
                    <option value="IT/소프트웨어">IT/소프트웨어</option>
                    <option value="서비스업">서비스업</option>
                    <option value="건설/부동산">건설/부동산</option>
                    <option value="도소매/무역">도소매/무역</option>
                </select>
                <input name="region" placeholder="지역 (예: 경기 화성)"
                       class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-primary">
                <textarea name="memo" placeholder="메모 (선택)" rows="2"
                          class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-primary resize-none"></textarea>
            </div>
            <button type="submit"
                    class="w-full mt-4 py-3 bg-primary text-white font-semibold rounded-xl text-sm">
                등록
            </button>
        </form>
    </div>
</div>

<style>
    @keyframes slide-up {
        from { transform: translateY(100%); }
        to { transform: translateY(0); }
    }
    .animate-slide-up { animation: slide-up 0.3s ease-out; }
</style>
{% endblock %}
