{% extends "layouts/base.html" %}

{% block body %}
<div class="max-w-md mx-auto bg-white min-h-screen flex flex-col items-center justify-center px-8">
    <div class="text-center mb-10">
        <h1 class="text-2xl font-bold text-gray-900 mb-2">어떤 역할이신가요?</h1>
        <p class="text-gray-500 text-sm">역할에 맞는 화면을 보여드립니다</p>
    </div>

    <form method="post" action="/auth/select-role" class="w-full space-y-4">

        <button type="submit" name="role" value="fc"
                class="w-full p-5 rounded-2xl border-2 border-gray-200 hover:border-primary text-left transition group">
            <div class="text-lg font-bold text-gray-900 group-hover:text-primary mb-1">FC (설계사)</div>
            <div class="text-sm text-gray-500">CEO 인맥을 관리하고, AI 브리핑으로 영업 기회를 발견합니다</div>
        </button>

        <button type="submit" name="role" value="ceo"
                class="w-full p-5 rounded-2xl border-2 border-gray-200 hover:border-primary text-left transition group">
            <div class="text-lg font-bold text-gray-900 group-hover:text-primary mb-1">CEO (대표)</div>
            <div class="text-sm text-gray-500">사업에 맞는 거래처를 AI가 자동으로 찾아드립니다</div>
        </button>
    </form>
</div>
{% endblock %}
