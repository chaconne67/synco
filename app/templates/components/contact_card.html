<div class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-50 transition cursor-pointer border border-gray-100">
    <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-sm font-semibold text-gray-500 shrink-0">
        {{ contact.name[0] if contact.name else '?' }}
    </div>
    <div class="flex-1 min-w-0">
        <div class="font-semibold text-sm text-gray-900">{{ contact.name }}</div>
        <div class="text-xs text-gray-500 truncate">
            {{ contact.company_name or '' }}
            {% if contact.industry %} / {{ contact.industry }}{% endif %}
        </div>
    </div>
    <div class="text-[10px] text-gray-400 shrink-0">
        {% if contact.last_interaction_at %}
            {{ contact.last_interaction_at.strftime('%m/%d') }}
        {% else %}
            신규
        {% endif %}
    </div>
</div>
