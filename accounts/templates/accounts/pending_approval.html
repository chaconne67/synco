{# accounts/templates/accounts/pending_approval.html #}
{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <title>synco — 승인 대기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">

<body class="bg-canvas font-sans text-ink min-h-screen flex items-center justify-center px-6 py-10">
  <div class="w-full max-w-md">
    <div class="flex flex-col items-center mb-8">
      <div class="w-12 h-12 bg-ink3 rounded flex items-center justify-center text-white font-black text-2xl tracking-tighter mb-4">S</div>
      <h1 class="text-lg font-black uppercase tracking-tight text-slate-900">Synco</h1>
      <p class="text-xs font-bold uppercase tracking-[0.2em] text-slate-400 mt-1">Pending Approval</p>

    <div class="mt-6 text-center">
