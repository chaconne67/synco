{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>synco — {{ title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>
<body class="bg-canvas font-sans text-ink min-h-screen flex items-center justify-center px-6 py-10">
  <div class="w-full max-w-md">
    <div class="flex flex-col items-center mb-8">
      <div class="w-12 h-12 bg-ink3 rounded flex items-center justify-center text-white font-black text-2xl tracking-tighter mb-4">S</div>
      <h1 class="text-lg font-black uppercase tracking-tight text-slate-900">Synco</h1>
      <p class="text-xs font-bold uppercase tracking-[0.2em] text-slate-400 mt-1">{{ title }}</p>
    </div>

    <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-8">
      {% if error %}
      <div class="mb-5 rounded-xl bg-rose-50 border border-rose-100 px-4 py-3 text-xs font-semibold text-rose-600">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="{{ form_action }}" class="space-y-4" autocomplete="off">
        {% csrf_token %}
        <div>
          <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">ID</label>
          <input type="text" name="username" autocomplete="off" required
                 class="w-full rounded-xl bg-slate-50 border border-transparent focus:border-ink3 focus:bg-white px-4 py-3 text-sm font-medium text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-ink3/10 transition" />
        </div>
        <div>
          <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Password</label>
          <input type="password" name="password" autocomplete="new-password" required
                 class="w-full rounded-xl bg-slate-50 border border-transparent focus:border-ink3 focus:bg-white px-4 py-3 text-sm font-medium text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-ink3/10 transition" />
        </div>
        <button type="submit"
                class="w-full rounded-xl bg-ink3 text-white font-bold text-xs uppercase tracking-widest py-3.5 shadow-lg shadow-ink3/20 hover:bg-ink2 transition-all mt-2">
          {{ submit_label }}
        </button>
      </form>
    </div>
  </div>
</body>
</html>
