{# accounts/templates/accounts/invite_code.html #}
{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>synco — 초대코드 입력</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>
<body class="bg-canvas font-sans text-ink min-h-screen flex items-center justify-center px-6 py-10">
  <div class="w-full max-w-md">
    <div class="flex flex-col items-center mb-8">
      <div class="w-12 h-12 bg-ink3 rounded flex items-center justify-center text-white font-black text-2xl tracking-tighter mb-4">S</div>
      <h1 class="text-lg font-black uppercase tracking-tight text-slate-900">Synco</h1>
      <p class="text-xs font-bold uppercase tracking-[0.2em] text-slate-400 mt-1">Invite Code</p>
    </div>

    <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-8">
      <h2 class="text-xl font-black text-slate-900 tracking-tight mb-2 text-center">조직에 참여하기</h2>
      <p class="text-sm text-slate-500 text-center mb-6">관리자에게 받은 초대코드 8자리를 입력하세요.</p>

      <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
          <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Invite Code</label>
          <input
            type="text"
            name="code"
            placeholder="XXXXXXXX"
            maxlength="8"
            class="w-full rounded-xl bg-slate-50 border border-transparent focus:border-ink3 focus:bg-white px-4 py-4 text-center text-xl font-mono font-bold tracking-[0.3em] uppercase text-slate-900 placeholder:text-slate-300 focus:outline-none focus:ring-2 focus:ring-ink3/10 transition"
            autocomplete="off"
            autofocus
            required
          >
        </div>

        {% if error %}
        <div class="rounded-xl bg-rose-50 border border-rose-100 px-4 py-3 text-xs font-semibold text-rose-600 text-center">
          {{ error }}
        </div>
        {% endif %}

        <button
          type="submit"
          class="w-full rounded-xl bg-ink3 text-white font-bold text-xs uppercase tracking-widest py-3.5 shadow-lg shadow-ink3/20 hover:bg-ink2 hover:scale-[1.01] active:scale-[0.99] transition-all"
        >
          참여하기
        </button>
      </form>
    </div>

    <div class="mt-6 text-center space-y-2">
      <p class="text-xs text-slate-400">초대코드가 없으신가요? 조직 관리자에게 문의하세요.</p>
      <a href="{% url 'logout' %}" class="inline-block text-xs font-bold uppercase tracking-widest text-slate-400 hover:text-slate-600 transition">Logout</a>
    </div>
  </div>
</body>
</html>
