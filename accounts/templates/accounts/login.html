{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>synco - 로그인</title>

  <!-- Pretendard Font -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">

  <!-- Tailwind CSS (built) -->
  <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>
<body class="bg-white font-sans text-gray-900">

  <div class="min-h-screen flex flex-col items-center justify-center px-6">

    <div class="w-full max-w-sm flex flex-col items-center">

      <!-- Logo & Tagline -->
      <div class="mb-12 text-center">
        <h1 class="text-display font-bold text-primary mb-3">synco</h1>
        <p class="text-gray-500 text-[15px]">AI로 인재를 빠르게 찾으세요</p>

      <!-- Kakao Login Button -->
      <a href="{% url 'kakao_login' %}"

        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="#191919">
          <path d="M12 3C6.48 3 2 6.58 2 10.9c0 2.78 1.86 5.22 4.66 6.6l-.96 3.56c-.08.3.26.54.52.36l4.2-2.78c.52.06 1.04.1 1.58.1 5.52 0 10-3.58 10-7.84S17.52 3 12 3z"/>
        </svg>

      </a>

      <!-- Terms -->
      <p class="mt-8 text-sm text-gray-500">
        <a href="/terms/" class="hover:text-gray-600">이용약관</a>
        <span class="mx-1">&middot;</span>
        <a href="/privacy/" class="hover:text-gray-600">개인정보처리방침</a>
      </p>

    </div>

  </div>

</html>
