<div class="group flex items-center gap-3 bg-white rounded-2xl border border-gray-200 shadow-sm p-4">
  <button hx-post="{% url 'contacts:task_complete' task.pk %}" hx-target="closest div" hx-swap="outerHTML"
          aria-label="업무 완료"
          class="w-7 h-7 rounded-full border-2 border-gray-300 flex-shrink-0 hover:border-primary hover:bg-primary/10 transition"></button>
  <div class="flex-1 min-w-0">
    <p class="text-sm font-medium truncate">{{ task.title }}</p>
    {% if task.contact %}
    <p class="text-xs text-gray-500 mt-0.5">{{ task.contact.name }} · {{ task.contact.company_name }}</p>
    {% endif %}
  </div>
  {% if task.due_date %}
  <span class="text-xs text-gray-500 flex-shrink-0">{{ task.due_date|date:"n/j" }}</span>
  {% endif %}
  <!-- Edit/Delete (visible on hover) -->
  <div class="flex items-center gap-0.5 flex-shrink-0">
    <button hx-get="{% url 'contacts:task_edit' task.pk %}" hx-target="#task-form-slot" hx-swap="innerHTML"
            class="p-2.5 text-gray-400 hover:text-gray-600" title="수정" aria-label="업무 수정">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
      </svg>
    </button>
    <button hx-post="{% url 'contacts:task_delete' task.pk %}" hx-target="closest .group" hx-swap="outerHTML"
            hx-confirm="이 업무를 삭제하시겠습니까?"
            class="p-2.5 text-gray-400 hover:text-red-500" title="삭제" aria-label="업무 삭제">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
      </svg>
    </button>
  </div>
</div>
