<section>
  <div class="flex items-center justify-between mb-3">
    <div class="flex items-center gap-2">
      <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
      </svg>
      <h3 class="text-base font-semibold">오늘의 업무</h3>
    </div>
    <button hx-get="{% url 'contacts:task_create' %}" hx-target="#task-form-slot" hx-swap="innerHTML"
            class="text-primary text-sm font-medium py-2 px-3" aria-label="업무 추가">+ 추가</button>
  </div>

  <div id="task-form-slot"></div>

  <div id="task-list">
    {% if pending_tasks %}
    <div class="space-y-2">
      {% for task in pending_tasks|slice:":5" %}
      {% include "accounts/partials/dashboard/_task_card.html" %}
      {% endfor %}
    </div>

    {% if total_task_count > 5 %}
    <button hx-get="{% url 'dashboard_tasks_all' %}"
            hx-target="#task-list"
            hx-swap="innerHTML"
            class="block w-full text-center text-sm text-primary font-medium mt-3 py-2">
      {{ total_task_count|add:"-5" }}건 더 보기
    </button>
    {% endif %}

    {% else %}
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5 text-center">
      <div class="w-10 h-10 mx-auto mb-2 rounded-xl bg-gray-100 flex items-center justify-center">
        <svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
        </svg>
      </div>
      <p class="text-sm text-gray-500">이번 주 처리할 업무가 없습니다</p>
    </div>
    {% endif %}
  </div>

  {% if overdue_count %}
  <div id="overdue-section" class="mt-3">
    <button hx-get="{% url 'dashboard_tasks_overdue' %}"
            hx-target="#overdue-list"
            hx-swap="innerHTML"
            class="flex items-center justify-between w-full bg-amber-50 rounded-2xl border border-amber-200 p-3 text-sm text-amber-700 font-medium">
      <span>밀린 업무 {{ overdue_count }}건</span>
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
      </svg>
    </button>
    <div id="overdue-list" class="mt-2"></div>
  </div>
  {% endif %}
</section>
