<div class="flex items-center gap-3 bg-white rounded-2xl border border-gray-200 shadow-sm p-4">
  <div class="flex-shrink-0 text-center min-w-[48px]">
    {% if show_date %}
    <div class="text-[10px] text-gray-400">{{ meeting.scheduled_at|date:"n/j" }}</div>
    {% endif %}
    <div class="text-sm font-bold text-primary">{{ meeting.scheduled_at|date:"H:i" }}</div>
  </div>
  <div class="w-px h-8 bg-gray-200"></div>
  <div class="flex-1 min-w-0">
    <a href="/contacts/{{ meeting.contact.pk }}/"
       hx-get="/contacts/{{ meeting.contact.pk }}/" hx-target="#main-content" hx-push-url="true"
       class="text-sm font-semibold truncate block hover:text-primary">{{ meeting.contact.name }}</a>
    <p class="text-xs text-gray-500 mt-0.5 truncate">{{ meeting.contact.company_name }}{% if meeting.location %} · {{ meeting.location }}{% endif %}</p>
  </div>
  <button hx-get="/intelligence/report/{{ meeting.contact.pk }}/"
          hx-target="#modal-container" hx-swap="innerHTML"
          class="flex-shrink-0 px-2.5 py-1.5 bg-primary-light text-primary text-xs font-semibold rounded-lg hover:bg-primary/20 transition"
          onclick="document.getElementById('modal-container').classList.remove('hidden')">
    리포트
  </button>
</div>
