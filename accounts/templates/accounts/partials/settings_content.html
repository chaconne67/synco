{% load static %}

<div class="space-y-4">
  <section class="bg-white rounded-xl border border-slate-100 shadow-sm p-6">
    <h3 class="text-xs font-black tracking-[0.2em] text-slate-400 uppercase mb-5">내 정보 · Profile</h3>

    <dl class="space-y-4">
      <div class="flex items-center justify-between">
        <dt class="text-xs font-bold uppercase tracking-widest text-slate-400">이름</dt>
        <dd class="text-sm font-bold text-slate-900">{{ user.first_name|default:"-" }}</dd>
      </div>
      <div class="flex items-center justify-between">
        <dt class="text-xs font-bold uppercase tracking-widest text-slate-400">소속</dt>
        <dd class="text-sm font-bold text-slate-900">{{ user.company_name|default:"-" }}</dd>
      </div>
      <div class="flex items-center justify-between">
        <dt class="text-xs font-bold uppercase tracking-widest text-slate-400">전화번호</dt>
        <dd class="text-sm font-bold text-slate-900">{{ user.phone|default:"-" }}</dd>
      </div>
    </dl>
  </section>

  <section class="bg-white rounded-xl border border-slate-100 shadow-sm p-6">
    <h3 class="text-xs font-black tracking-[0.2em] text-slate-400 uppercase mb-5">앱 정보 · App</h3>

    <div class="divide-y divide-slate-100">
      <div class="flex items-center justify-between py-3 first:pt-0">
        <span class="text-xs font-bold uppercase tracking-widest text-slate-400">버전</span>
        <span class="text-sm font-bold text-slate-900">1.0.0</span>
      </div>
      <a href="{% url 'terms' %}" class="flex items-center justify-between py-3 group hover:text-ink3 transition-colors">
        <span class="text-sm font-semibold text-slate-700 group-hover:text-ink3">이용약관</span>
        <svg class="w-4 h-4 text-slate-300 group-hover:text-ink3 transition-colors" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>
      </a>
      <a href="{% url 'privacy' %}" class="flex items-center justify-between py-3 last:pb-0 group hover:text-ink3 transition-colors">
        <span class="text-sm font-semibold text-slate-700 group-hover:text-ink3">개인정보처리방침</span>
        <svg class="w-4 h-4 text-slate-300 group-hover:text-ink3 transition-colors" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>
      </a>
    </div>
  </section>

  <div class="pt-4">
    <a href="{% url 'logout' %}"
       class="block w-full text-center rounded-xl bg-white border border-rose-200 text-rose-600 font-bold text-xs uppercase tracking-widest py-4 hover:bg-rose-50 transition-all">
      로그아웃
    </a>
  </div>
</div>
