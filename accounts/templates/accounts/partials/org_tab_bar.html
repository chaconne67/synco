{# accounts/templates/accounts/partials/org_tab_bar.html #}
<div class="bg-white rounded-xl border border-slate-100 shadow-sm p-1.5 inline-flex items-center gap-1 flex-wrap">
  {% with active=active_tab|default:"info" %}

  <button hx-get="{% url 'org_info' %}"
          hx-target="#org-content"
          hx-push-url="true"
          class="px-5 py-2 rounded-lg text-xs font-bold uppercase tracking-widest transition-colors
            {% if active == 'info' %}bg-ink3 text-white shadow-sm{% else %}text-slate-500 hover:text-slate-900 hover:bg-slate-50{% endif %}">
    조직 정보
  </button>

  <button hx-get="{% url 'org_members' %}"
          hx-target="#org-content"
          hx-push-url="true"
          class="px-5 py-2 rounded-lg text-xs font-bold uppercase tracking-widest transition-colors
            {% if active == 'members' %}bg-ink3 text-white shadow-sm{% else %}text-slate-500 hover:text-slate-900 hover:bg-slate-50{% endif %}">
    멤버 관리
  </button>

  <button hx-get="{% url 'org_invites' %}"
          hx-target="#org-content"
          hx-push-url="true"
          class="px-5 py-2 rounded-lg text-xs font-bold uppercase tracking-widest transition-colors
            {% if active == 'invites' %}bg-ink3 text-white shadow-sm{% else %}text-slate-500 hover:text-slate-900 hover:bg-slate-50{% endif %}">
    초대코드
  </button>

  {% endwith %}
</div>
