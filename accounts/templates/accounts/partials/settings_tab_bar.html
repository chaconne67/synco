{# accounts/templates/accounts/partials/settings_tab_bar.html #}
<div class="bg-white rounded-xl border border-slate-100 shadow-sm p-1.5 inline-flex items-center gap-1 flex-wrap">
  {% with active=active_tab|default:"profile" %}

  <button hx-get="{% url 'settings_profile' %}"
          hx-target="#settings-content"
          hx-push-url="true"
          class="px-5 py-2 rounded-lg text-xs font-bold uppercase tracking-widest transition-colors
            {% if active == 'profile' %}bg-ink3 text-white shadow-sm{% else %}text-muted hover:text-slate-900 hover:bg-slate-50{% endif %}">
    프로필
  </button>

  <button hx-get="{% url 'settings_email' %}"
          hx-target="#settings-content"
          hx-push-url="true"
          class="px-5 py-2 rounded-lg text-xs font-bold uppercase tracking-widest transition-colors
            {% if active == 'email' %}bg-ink3 text-white shadow-sm{% else %}text-muted hover:text-slate-900 hover:bg-slate-50{% endif %}">
    이메일
  </button>

  <button hx-get="{% url 'settings_telegram' %}"
          hx-target="#settings-content"
          hx-push-url="true"
          class="px-5 py-2 rounded-lg text-xs font-bold uppercase tracking-widest transition-colors
            {% if active == 'telegram' %}bg-ink3 text-white shadow-sm{% else %}text-muted hover:text-slate-900 hover:bg-slate-50{% endif %}">
    텔레그램
  </button>

  <button hx-get="{% url 'settings_notify' %}"
          hx-target="#settings-content"
          hx-push-url="true"
          class="px-5 py-2 rounded-lg text-xs font-bold uppercase tracking-widest transition-colors
            {% if active == 'notify' %}bg-ink3 text-white shadow-sm{% else %}text-muted hover:text-slate-900 hover:bg-slate-50{% endif %}">
    알림
  </button>

  {% endwith %}
</div>
