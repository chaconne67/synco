{# accounts/templates/accounts/partials/settings_notify.html #}
{% load static %}

<section class="bg-white rounded-xl border border-slate-100 shadow-sm p-6">
  <h2 class="text-xs font-black tracking-[0.2em] text-slate-400 uppercase mb-4">알림 설정</h2>

  <form method="post"
        hx-post="{% url 'settings_notify' %}"
        hx-target="#settings-content"
        hx-push-url="false">
    {% csrf_token %}

    <div class="space-y-1">
      <!-- Header row -->
      <div class="grid grid-cols-3 gap-4 pb-2 border-b border-slate-100">
        <span class="text-xs font-bold uppercase tracking-widest text-slate-400">알림 유형</span>
        <span class="text-xs font-bold uppercase tracking-widest text-slate-400 text-center">웹</span>
        <span class="text-xs font-bold uppercase tracking-widest text-slate-400 text-center">텔레그램</span>
      </div>

      <!-- Contact result -->
      <div class="grid grid-cols-3 gap-4 py-3 border-b border-slate-50">
        <span class="text-sm font-semibold text-slate-700">새 컨택 결과</span>
        <div class="text-center">
          <input type="checkbox" name="contact_result_web"
                 {% if form.initial.contact_result_web %}checked{% endif %}
                 class="w-4 h-4 text-ink3 rounded border-slate-300 focus:ring-ink3/30">
        </div>
        <div class="text-center">
          <input type="checkbox" name="contact_result_telegram"
                 {% if form.initial.contact_result_telegram %}checked{% endif %}
                 class="w-4 h-4 text-ink3 rounded border-slate-300 focus:ring-ink3/30">
        </div>
      </div>

      <!-- Recommendation feedback -->
      <div class="grid grid-cols-3 gap-4 py-3 border-b border-slate-50">
        <span class="text-sm font-semibold text-slate-700">추천 피드백</span>
        <div class="text-center">
          <input type="checkbox" name="recommendation_feedback_web"
                 {% if form.initial.recommendation_feedback_web %}checked{% endif %}
                 class="w-4 h-4 text-ink3 rounded border-slate-300 focus:ring-ink3/30">
        </div>
        <div class="text-center">
          <input type="checkbox" name="recommendation_feedback_telegram"
                 {% if form.initial.recommendation_feedback_telegram %}checked{% endif %}
                 class="w-4 h-4 text-ink3 rounded border-slate-300 focus:ring-ink3/30">
        </div>
      </div>

      <!-- Project approval -->
      <div class="grid grid-cols-3 gap-4 py-3 border-b border-slate-50">
        <span class="text-sm font-semibold text-slate-700">프로젝트 승인 요청</span>
        <div class="text-center">
          <input type="checkbox" name="project_approval_web"
                 {% if form.initial.project_approval_web %}checked{% endif %}
                 class="w-4 h-4 text-ink3 rounded border-slate-300 focus:ring-ink3/30">
        </div>
        <div class="text-center">
          <input type="checkbox" name="project_approval_telegram"
                 {% if form.initial.project_approval_telegram %}checked{% endif %}
                 class="w-4 h-4 text-ink3 rounded border-slate-300 focus:ring-ink3/30">
        </div>
      </div>

      <!-- Newsfeed update -->
      <div class="grid grid-cols-3 gap-4 py-3">
        <span class="text-sm font-semibold text-slate-700">뉴스피드 업데이트</span>
        <div class="text-center">
          <input type="checkbox" name="newsfeed_update_web"
                 {% if form.initial.newsfeed_update_web %}checked{% endif %}
                 class="w-4 h-4 text-ink3 rounded border-slate-300 focus:ring-ink3/30">
        </div>
        <div class="text-center">
          <input type="checkbox" name="newsfeed_update_telegram"
                 {% if form.initial.newsfeed_update_telegram %}checked{% endif %}
                 class="w-4 h-4 text-ink3 rounded border-slate-300 focus:ring-ink3/30">
        </div>
      </div>
    </div>

    <div class="mt-6">
      <button type="submit"
              class="w-full py-3.5 text-xs font-bold uppercase tracking-widest text-white bg-ink3 rounded-xl shadow-lg shadow-ink3/20 hover:bg-ink2 hover:scale-[1.005] active:scale-[0.995] transition-all">
        설정 저장
      </button>
    </div>
  </form>
</section>
