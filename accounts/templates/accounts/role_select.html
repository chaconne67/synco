<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>synco - 역할 선택</title>

  <!-- Pretendard Font -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Pretendard', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
          },
          colors: {
            primary: {
              DEFAULT: '#5B6ABF',
              dark: '#4A59AE',
              light: '#E8EAFF',
            },
          },
        },
      },
    }
  </script>
</head>
<body class="bg-white font-sans text-gray-900">

  <div class="min-h-screen flex flex-col items-center justify-center px-6">

    <div class="w-full max-w-sm">

      <!-- Title -->
      <h1 class="text-xl font-bold text-center mb-8">어떤 역할로 사용하시겠습니까?</h1>

      <form method="POST" action="{% url 'role_select' %}" id="role-form">
        {% csrf_token %}
        <input type="hidden" name="role" id="role-input" value="">

        <!-- Role Cards -->
        <div class="space-y-4 mb-8">

          <!-- FC Card -->
          <button type="button"
                  onclick="selectRole('fc', this)"
                  class="role-card w-full text-left p-5 rounded-2xl border border-gray-100 bg-white transition hover:border-gray-200 focus:outline-none">
            <div class="flex items-start gap-4">
              <div class="w-12 h-12 rounded-xl bg-primary-light flex items-center justify-center flex-shrink-0">
                <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
              </div>
              <div>
                <h3 class="font-semibold text-base">FC (설계사)</h3>
                <p class="text-sm text-gray-500 mt-1">고객 인맥을 AI로 관리</p>
              </div>
            </div>
          </button>

          <!-- CEO Card -->
          <button type="button"
                  onclick="selectRole('ceo', this)"
                  class="role-card w-full text-left p-5 rounded-2xl border border-gray-100 bg-white transition hover:border-gray-200 focus:outline-none">
            <div class="flex items-start gap-4">
              <div class="w-12 h-12 rounded-xl bg-primary-light flex items-center justify-center flex-shrink-0">
                <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
              </div>
              <div>
                <h3 class="font-semibold text-base">CEO (대표)</h3>
                <p class="text-sm text-gray-500 mt-1">사업 기회를 AI가 발견</p>
              </div>
            </div>
          </button>

        </div>

        <!-- Submit Button -->
        <button type="submit"
                id="submit-btn"
                disabled
                class="w-full py-3 rounded-xl font-semibold text-sm text-white bg-primary disabled:opacity-40 disabled:cursor-not-allowed hover:bg-primary-dark transition">
          시작하기
        </button>

      </form>

    </div>

  </div>

  <script>
    function selectRole(role, el) {
      // Update hidden input
      document.getElementById('role-input').value = role;

      // Reset all cards
      document.querySelectorAll('.role-card').forEach(function(card) {
        card.classList.remove('border-primary', 'ring-2', 'ring-primary/20');
        card.classList.add('border-gray-100');
      });

      // Highlight selected card
      el.classList.remove('border-gray-100');
      el.classList.add('border-primary', 'ring-2', 'ring-primary/20');

      // Enable submit button
      document.getElementById('submit-btn').disabled = false;
    }
  </script>

</body>
</html>
