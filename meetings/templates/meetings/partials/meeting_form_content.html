<!-- Header -->
<div class="flex items-center justify-between px-4 pt-6 pb-4">
  <div class="flex items-center">
    <a href="{% if editing %}{% url 'meetings:detail' meeting.pk %}{% else %}{% url 'meetings:list' %}{% endif %}"
       hx-get="{% if editing %}{% url 'meetings:detail' meeting.pk %}{% else %}{% url 'meetings:list' %}{% endif %}" hx-target="#main-content" hx-push-url="true"
       class="min-w-[44px] min-h-[44px] flex items-center justify-center text-gray-500 hover:text-gray-700 mr-3">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </a>
    <h1 class="text-lg font-bold text-gray-900">{% if editing %}&#48120;&#54021; &#49688;&#51221;{% else %}&#48120;&#54021; &#46321;&#47197;{% endif %}</h1>
  </div>
  <button type="submit" form="meeting-form"
          class="bg-primary text-white font-semibold py-2.5 px-5 rounded-lg text-[15px] hover:bg-primary-dark transition">
    &#51200;&#51109;
  </button>
</div>

<form id="meeting-form"
      method="post"
      action="{% if editing %}{% url 'meetings:edit' meeting.pk %}{% else %}{% url 'meetings:create' %}{% endif %}"
      hx-post="{% if editing %}{% url 'meetings:edit' meeting.pk %}{% else %}{% url 'meetings:create' %}{% endif %}"
      class="px-4 pb-8 space-y-4">
  {% csrf_token %}

  <!-- Contact selector -->
  <div>
    <label class="block text-[15px] font-medium text-gray-700 mb-1.5">&#50672;&#46973;&#52376;</label>
    <select name="contact_id" id="contact-select" required
            {% if editing %}disabled{% endif %}
            onchange="autoFillTitle(this)"
            class="w-full px-4 py-3 border border-gray-200 rounded-lg text-[15px] bg-white focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition {% if editing %}bg-gray-50 text-gray-500{% endif %}">
      <option value="">&#50672;&#46973;&#52376;&#47484; &#49440;&#53469;&#54644;&#51452;&#49464;&#50836;</option>
      {% for contact in contacts %}
      <option value="{{ contact.pk }}"
              data-name="{{ contact.name }}"
              {% if selected_contact and selected_contact.pk == contact.pk %}selected{% endif %}>
        {{ contact.name }}{% if contact.company_name %} ({{ contact.company_name }}){% endif %}
      </option>
      {% endfor %}
    </select>
    {% if editing %}
    <input type="hidden" name="contact_id" value="{{ meeting.contact.pk }}">
    {% endif %}
  </div>

  <!-- Title -->
  <div>
    <label class="block text-[15px] font-medium text-gray-700 mb-1.5">&#51228;&#47785;</label>
    <input type="text" name="title" id="meeting-title"
           value="{% if editing %}{{ meeting.title }}{% elif selected_contact %}{{ selected_contact.name }}님 미팅{% endif %}"
           placeholder="&#48120;&#54021; &#51228;&#47785;&#51012; &#51077;&#47141;&#54644;&#51452;&#49464;&#50836;"
           class="w-full px-4 py-3 border border-gray-200 rounded-lg text-[15px] focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition">
  </div>

  <!-- Date -->
  <div>
    <label class="block text-[15px] font-medium text-gray-700 mb-1.5">&#45216;&#51676;</label>
    <input type="date" name="date" id="meeting-date" required
           value="{% if editing %}{{ meeting.scheduled_at|date:'Y-m-d' }}{% endif %}"
           class="w-full px-4 py-3 border border-gray-200 rounded-lg text-[15px] focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition">
  </div>

  <!-- Time range -->
  <div class="grid grid-cols-2 gap-3">
    <div>
      <label class="block text-[15px] font-medium text-gray-700 mb-1.5">&#49884;&#51089;</label>
      <input type="time" name="start_time" id="meeting-start-time" required
             value="{% if editing %}{{ meeting.scheduled_at|time:'H:i' }}{% endif %}"
             onchange="autoFillEndTime(this)"
             class="w-full px-4 py-3 border border-gray-200 rounded-lg text-[15px] focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition">
    </div>
    <div>
      <label class="block text-[15px] font-medium text-gray-700 mb-1.5">&#51333;&#47308;</label>
      <input type="time" name="end_time" id="meeting-end-time" required
             value="{% if editing %}{{ meeting.scheduled_end_at|time:'H:i' }}{% endif %}"
             class="w-full px-4 py-3 border border-gray-200 rounded-lg text-[15px] focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition">
    </div>
  </div>

  <!-- Location -->
  <div>
    <label class="block text-[15px] font-medium text-gray-700 mb-1.5">&#51109;&#49548;</label>
    <input type="text" name="location"
           value="{% if editing %}{{ meeting.location }}{% endif %}"
           placeholder="&#48120;&#54021; &#51109;&#49548;&#47484; &#51077;&#47141;&#54644;&#51452;&#49464;&#50836;"
           class="w-full px-4 py-3 border border-gray-200 rounded-lg text-[15px] focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition">
  </div>

  <!-- Hidden combined datetime fields for backend -->
  <input type="hidden" name="scheduled_at" id="scheduled-at">
  <input type="hidden" name="scheduled_end_at" id="scheduled-end-at">
</form>

<script>
function autoFillTitle(select) {
  const option = select.options[select.selectedIndex];
  const titleInput = document.getElementById('meeting-title');
  if (option && option.dataset.name && !titleInput.value) {
    titleInput.value = option.dataset.name + '님 미팅';
  }
}

function autoFillEndTime(startInput) {
  const endInput = document.getElementById('meeting-end-time');
  if (startInput.value && !endInput.value) {
    const [h, m] = startInput.value.split(':').map(Number);
    const endH = (h + 1) % 24;
    endInput.value = String(endH).padStart(2, '0') + ':' + String(m).padStart(2, '0');
  }
}

// Combine date + time into datetime before submit
document.getElementById('meeting-form').addEventListener('submit', function() {
  const date = document.getElementById('meeting-date').value;
  const startTime = document.getElementById('meeting-start-time').value;
  const endTime = document.getElementById('meeting-end-time').value;
  if (date && startTime) {
    document.getElementById('scheduled-at').value = date + 'T' + startTime;
  }
  if (date && endTime) {
    document.getElementById('scheduled-end-at').value = date + 'T' + endTime;
  }
});
</script>
