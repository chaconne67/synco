<div class="space-y-3">
  {% for c in candidates %}
    {% include "candidates/partials/candidate_card.html" with candidate=c %}
  {% empty %}
    <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-12 text-center">
      <div class="mx-auto w-14 h-14 rounded-full bg-slate-50 flex items-center justify-center mb-5">
        <svg class="w-6 h-6 text-slate-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
      </div>
      <p class="text-sm font-bold text-slate-900">검색 결과가 없습니다</p>
      <p class="text-xs font-bold uppercase tracking-widest text-slate-400 mt-2">Try a different query</p>
    </div>
  {% endfor %}

  {% if has_more %}
  <div hx-get="/candidates/?page={{ page|add:1 }}{% if active_category %}&category={{ active_category }}{% endif %}{% if session %}&session_id={{ session.pk }}{% endif %}{% if rec_status_filter %}&rec_status={{ rec_status_filter }}{% endif %}{% if target_project %}&project={{ target_project.pk }}{% endif %}"
       hx-target="this"
       hx-swap="outerHTML"
       hx-trigger="revealed"
       class="py-6 text-center">
    <span class="text-xs font-bold uppercase tracking-widest text-slate-400">Loading more...</span>
  </div>
  {% endif %}
</div>
