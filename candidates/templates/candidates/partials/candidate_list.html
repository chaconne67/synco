<div class="max-w-4xl mx-auto px-4 py-3 space-y-2">
  {% for c in candidates %}
    {% include "candidates/partials/candidate_card.html" with candidate=c %}
  {% empty %}
    <div class="text-center py-20 text-gray-400">
      <svg class="w-16 h-16 mx-auto mb-4 text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <p class="text-base font-medium text-gray-500">검색 결과가 없습니다</p>
      <p class="text-sm mt-1 text-gray-500">다른 조건으로 검색해보세요</p>
    </div>
  {% endfor %}

  {% if has_more %}
  <div hx-get="/candidates/?page={{ page|add:1 }}{% if active_category %}&category={{ active_category }}{% endif %}{% if session %}&session_id={{ session.pk }}{% endif %}"
       hx-target="this"
       hx-swap="outerHTML"
       hx-trigger="revealed"
       class="py-6 text-center">
    <span class="text-gray-500 text-sm">더 불러오는 중...</span>
  </div>
  {% endif %}
</div>
