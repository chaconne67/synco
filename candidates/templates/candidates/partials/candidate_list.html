<div class="space-y-2">
  {% for c in candidates %}
    {% include "candidates/partials/candidate_card.html" with candidate=c %}
  {% empty %}
    <div class="text-center py-20">
      <div class="mx-auto h-14 w-14 rounded-xl bg-slate-100 text-slate-400 flex items-center justify-center mb-4">
        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
      </div>
      <p class="text-[15px] font-bold text-slate-700">검색 결과가 없습니다</p>
      <p class="text-[13px] text-slate-500 mt-1">다른 조건으로 검색해보세요</p>
    </div>
  {% endfor %}

  {% if has_more %}
  <div hx-get="/candidates/?page={{ page|add:1 }}{% if active_category %}&category={{ active_category }}{% endif %}{% if session %}&session_id={{ session.pk }}{% endif %}{% if rec_status_filter %}&rec_status={{ rec_status_filter }}{% endif %}"
       hx-target="this"
       hx-swap="outerHTML"
       hx-trigger="revealed"
       class="py-6 text-center">
    <span class="text-slate-500 text-[13px]">더 불러오는 중...</span>
  </div>
  {% endif %}
</div>
