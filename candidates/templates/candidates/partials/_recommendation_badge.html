{% if candidate.recommendation_status == "recommended" %}
  <span class="text-sm px-2 py-0.5 rounded-full bg-green-100 text-green-700 font-medium">추천</span>
{% elif candidate.recommendation_status == "not_recommended" %}
  <span class="text-sm px-2 py-0.5 rounded-full bg-red-100 text-red-700 font-medium">비추천</span>
{% elif candidate.recommendation_status == "on_hold" %}
  <span class="text-sm px-2 py-0.5 rounded-full bg-yellow-100 text-yellow-700 font-medium">보류</span>
{% endif %}
