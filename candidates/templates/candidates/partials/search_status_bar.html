{% if last_turn %}
<div class="bg-primary-light border-b border-primary/10 cursor-pointer" onclick="toggleChatbot()">
  <div class="max-w-4xl mx-auto px-4 py-2">
    <p class="text-sm text-primary font-medium truncate">
      🔍 "{{ last_turn.user_text }}" — {{ last_turn.result_count }}명 찾음
    </p>
  </div>
</div>
{% else %}
<div class="bg-gray-50 border-b border-gray-100">
  <div class="max-w-4xl mx-auto px-4 py-2">
    <p class="text-sm text-gray-500">전체 후보자 {{ total }}명</p>
  </div>
</div>
{% endif %}
