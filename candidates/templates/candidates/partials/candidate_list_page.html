{% for c in candidates %}
  {% include "candidates/partials/candidate_card_v2.html" with candidate=c %}
{% endfor %}

{% if has_more %}
<div hx-get="/candidates/?page={{ page|add:1 }}{% if session %}&session_id={{ session.pk }}{% else %}{% if active_category %}&category={{ active_category }}{% endif %}{% endif %}{% if target_project %}&project={{ target_project.pk }}{% endif %}"
     hx-target="this"
     hx-swap="outerHTML"
     hx-trigger="revealed"
     class="py-6 text-center break-inside-avoid"
     style="column-span: all;">
  <span class="eyebrow text-faint">Loading more...</span>
</div>
{% endif %}
