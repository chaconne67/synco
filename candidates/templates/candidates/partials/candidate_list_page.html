{% for c in candidates %}
  {% include "candidates/partials/candidate_card.html" with candidate=c %}
{% endfor %}

{% if has_more %}
<div hx-get="/candidates/?page={{ page|add:1 }}{% if active_category %}&category={{ active_category }}{% endif %}{% if session %}&session_id={{ session.pk }}{% endif %}"
     hx-target="this"
     hx-swap="outerHTML"
     hx-trigger="revealed"
     class="py-6 text-center">
  <span class="text-gray-500 text-sm">더 불러오는 중...</span>
</div>
{% endif %}
