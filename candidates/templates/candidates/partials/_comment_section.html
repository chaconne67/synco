<!-- Comment form -->
<div class="bg-white rounded-xl border border-gray-200 p-4">
  <h2 class="text-subheading text-gray-900 mb-3">검수 판정</h2>

  <form hx-post="{% url 'candidates:comment_create' candidate.pk %}"
        hx-target="#comment-list"
        hx-swap="innerHTML"
        class="space-y-4">
    {% csrf_token %}

    <!-- Recommendation status -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">판정</label>
      <div class="flex gap-3">
        {% with current=candidate.recommendation_status %}
        <label class="flex items-center gap-1.5 cursor-pointer">
          <input type="radio" name="recommendation_status" value="recommended"
                 {% if current == "recommended" %}checked{% endif %}
                 class="text-green-600 focus:ring-green-500">
          <span class="text-sm text-gray-700">추천</span>
        </label>
        <label class="flex items-center gap-1.5 cursor-pointer">
          <input type="radio" name="recommendation_status" value="not_recommended"
                 {% if current == "not_recommended" %}checked{% endif %}
                 class="text-red-600 focus:ring-red-500">
          <span class="text-sm text-gray-700">비추천</span>
        </label>
        <label class="flex items-center gap-1.5 cursor-pointer">
          <input type="radio" name="recommendation_status" value="on_hold"
                 {% if current == "on_hold" %}checked{% endif %}
                 class="text-yellow-600 focus:ring-yellow-500">
          <span class="text-sm text-gray-700">보류</span>
        </label>
        {% endwith %}
      </div>
    </div>

    <!-- Reason codes -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">사유 선택</label>
      <div class="grid grid-cols-2 gap-2">
        {% for code, label in reason_codes.items %}
        <label class="flex items-center gap-1.5 cursor-pointer">
          <input type="checkbox" name="reason_codes" value="{{ code }}"
                 class="rounded text-indigo-600 focus:ring-indigo-500">
          <span class="text-[13px] text-gray-600">{{ label }}</span>
        </label>
        {% endfor %}
      </div>
    </div>

    <!-- Content with voice input -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">코멘트</label>
      <div class="relative">
        <textarea name="content" rows="3"
                  class="w-full border border-gray-300 rounded-lg px-3 py-2 text-[14px] focus:ring-indigo-500 focus:border-indigo-500 pr-10"
                  placeholder="인터뷰 결과, 확인 사항 등을 기록하세요"></textarea>
        <button type="button" data-voice-input
                class="absolute right-2 top-2 text-gray-400 hover:text-indigo-600 transition"
                title="음성 입력">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4M12 15a3 3 0 003-3V5a3 3 0 00-6 0v7a3 3 0 003 3z"/>
          </svg>
        </button>
      </div>
      <input type="hidden" name="input_method" value="text">
    </div>

    <button type="submit"
            class="w-full bg-indigo-600 text-white font-semibold py-2 px-4 rounded-lg text-[14px] hover:bg-indigo-700 transition">
      저장
    </button>
  </form>
</div>
