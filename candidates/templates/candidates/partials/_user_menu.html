<div class="relative" id="user-menu-wrapper">
  <button onclick="document.getElementById('user-dropdown').classList.toggle('hidden')"
          class="w-9 h-9 rounded-full bg-ink3/10 text-ink3 font-semibold text-sm flex items-center justify-center hover:bg-ink3/20 transition overflow-hidden">
    {% if user.avatar %}
      <img src="{{ user.avatar.url }}" alt="{{ user.display_name }}" class="w-full h-full object-cover">
    {% else %}
      {{ user.display_initial }}
    {% endif %}
  </button>
  <div id="user-dropdown" class="hidden absolute right-0 mt-2 min-w-[200px] bg-white rounded-xl shadow-lg border border-slate-100 py-2 z-50">
    <div class="px-4 py-3 border-b border-slate-100">
      <p class="text-base font-semibold text-slate-900 whitespace-nowrap">{{ user.display_name }}</p>
      {% if user.email %}<p class="text-xs text-faint mt-0.5">{{ user.email }}</p>{% endif %}
    </div>
    <a href="/accounts/settings/" class="flex items-center gap-3 px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 transition whitespace-nowrap">
      <svg class="w-4 h-4 text-faint flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      설정
    </a>
    <a href="{% url 'logout' %}" class="flex items-center gap-3 px-4 py-2.5 text-sm text-rose-500 hover:bg-rose-50 transition whitespace-nowrap">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      로그아웃
    </a>
  </div>
</div>
<script>
document.addEventListener('click', function(e) {
  var w = document.getElementById('user-menu-wrapper');
  var d = document.getElementById('user-dropdown');
  if (w && d && !w.contains(e.target)) d.classList.add('hidden');
});
</script>
