<div class="flex gap-2">
  <div class="bg-slate-50 rounded-2xl rounded-tl-sm px-4 py-3 max-w-[90%]">
    <p class="text-sm text-slate-900 font-medium">안녕하세요! 마이크를 눌러 음성으로 검색하세요.</p>
    <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mt-2">예시</p>
    <div class="flex flex-wrap gap-1.5 mt-2">
      <button onclick="searchWithChip('영업 경력 10년 이상')"
              class="text-xs font-semibold bg-white border border-slate-100 rounded-full px-3 py-1.5 hover:border-primary/30 hover:text-primary transition">
        영업 경력 10년 이상
      </button>
      <button onclick="searchWithChip('삼성전자 출신 HR')"
              class="text-xs font-semibold bg-white border border-slate-100 rounded-full px-3 py-1.5 hover:border-primary/30 hover:text-primary transition">
        삼성전자 출신 HR
      </button>
      <button onclick="searchWithChip('강남 30대 여성')"
              class="text-xs font-semibold bg-white border border-slate-100 rounded-full px-3 py-1.5 hover:border-primary/30 hover:text-primary transition">
        강남 30대 여성
      </button>
    </div>
  </div>
</div>

{% for turn in turns %}
  <div class="flex justify-end">
    <div class="bg-primary text-white rounded-2xl rounded-tr-sm px-4 py-3 max-w-[80%]">
      <p class="text-sm font-medium">{{ turn.user_text }}</p>
    </div>
  </div>

  <div class="flex gap-2">
    <div class="bg-slate-50 rounded-2xl rounded-tl-sm px-4 py-3 max-w-[80%]">
      <p class="text-sm text-slate-900 font-medium">{{ turn.ai_response }}</p>
    </div>
  </div>
{% endfor %}
