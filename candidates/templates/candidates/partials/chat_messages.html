<div class="flex gap-2">
  <div class="bg-gray-100 rounded-2xl rounded-tl-sm px-3 py-2 max-w-[90%]">
    <p class="text-[15px] text-gray-900">안녕하세요! 마이크를 눌러 음성으로 검색하세요.</p>
    <p class="text-[13px] text-gray-500 mt-1">예를 들어 이렇게 말씀해보세요:</p>
    <div class="flex flex-wrap gap-1.5 mt-2">
      <button onclick="searchWithChip('영업 경력 10년 이상')"
              class="text-[13px] bg-white border border-gray-200 rounded-full px-3 py-1 hover:border-primary hover:text-primary transition">
        영업 경력 10년 이상
      </button>
      <button onclick="searchWithChip('삼성전자 출신 HR')"
              class="text-[13px] bg-white border border-gray-200 rounded-full px-3 py-1 hover:border-primary hover:text-primary transition">
        삼성전자 출신 HR
      </button>
      <button onclick="searchWithChip('강남 30대 여성')"
              class="text-[13px] bg-white border border-gray-200 rounded-full px-3 py-1 hover:border-primary hover:text-primary transition">
        강남 30대 여성
      </button>
    </div>
  </div>
</div>

{% for turn in turns %}
  <div class="flex justify-end">
    <div class="bg-primary text-white rounded-2xl rounded-tr-sm px-3 py-2 max-w-[80%]">
      <p class="text-[15px]">{{ turn.user_text }}</p>
    </div>
  </div>

  <div class="flex gap-2">
    <div class="bg-gray-100 rounded-2xl rounded-tl-sm px-3 py-2 max-w-[80%]">
      <p class="text-[15px] text-gray-900">{{ turn.ai_response }}</p>
    </div>
  </div>
{% endfor %}
