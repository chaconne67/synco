<!-- Chatbot overlay -->
<div id="chatbot-overlay"
     class="fixed inset-0 bg-black/30 z-40 hidden opacity-0 transition-opacity duration-300"
     onclick="toggleChatbot()"></div>

<!-- Chatbot modal — slides up from bottom -->
<div id="chatbot-modal"
     class="fixed z-50 hidden slide-closed
            bottom-0 inset-x-0 rounded-t-2xl
            bg-white shadow-2xl flex flex-col"
     style="height:85vh;height:85dvh"
     role="dialog"
     aria-modal="true"
     aria-label="AI 검색">

  <!-- Header -->
  <div class="flex items-center justify-between px-5 py-4 border-b border-slate-100">
    <h2 class="text-xs font-black uppercase tracking-[0.2em] text-slate-900">Synco AI Search</h2>
    <button onclick="toggleChatbot()"
            class="text-slate-400 hover:text-slate-600 min-w-[44px] min-h-[44px] flex items-center justify-center"
            aria-label="닫기">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <!-- Drag handle (mobile) -->
  <div class="lg:hidden flex justify-center py-1 cursor-grab" id="drag-handle">
    <div class="w-10 h-1 bg-slate-300 rounded-full"></div>
  </div>

  <!-- Messages area -->
  <div id="chat-messages" class="flex-1 overflow-y-auto px-4 py-3 space-y-3">
    <div class="flex gap-2">
      <div class="bg-slate-50 rounded-2xl rounded-tl-sm px-4 py-3 max-w-[90%]">
        <p class="text-sm text-slate-900 font-medium">안녕하세요! 아래 마이크를 눌러 음성으로 검색하세요.</p>
        <p class="text-xs font-bold uppercase tracking-widest text-slate-400 mt-2">예시</p>
        <div class="flex flex-wrap gap-1.5 mt-2">
          <button onclick="searchWithChip('영업 경력 10년 이상')"
                  class="text-xs font-semibold bg-white border border-slate-100 rounded-full px-3 py-1.5 min-h-[32px] hover:border-ink3/30 hover:text-ink3 transition">
            영업 경력 10년 이상
          </button>
          <button onclick="searchWithChip('삼성전자 출신 HR')"
                  class="text-xs font-semibold bg-white border border-slate-100 rounded-full px-3 py-1.5 min-h-[32px] hover:border-ink3/30 hover:text-ink3 transition">
            삼성전자 출신 HR
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Voice input area — always visible at bottom -->
  <div class="border-t border-slate-100 px-4 pt-4" style="padding-bottom: max(24px, env(safe-area-inset-bottom))">
    <!-- Idle state: minimize | mic | keyboard — Font Awesome icons -->
    <div id="voice-idle" class="flex items-center justify-between gap-6">
      <button id="minimize-btn" onclick="toggleChatbot()"
              class="w-14 h-14 flex items-center justify-center text-slate-400 hover:text-slate-600 transition"
              aria-label="최소화">
        <i class="fa-regular fa-square-minus" style="font-size:24px"></i>
      </button>
      <button onclick="startRecording()"
              class="w-14 h-14 flex items-center justify-center rounded-full bg-ink3 text-white shadow-lg
                     hover:bg-ink2 active:scale-95 transition-all"
              aria-label="마이크">
        <i class="fa-solid fa-microphone" style="font-size:24px"></i>
      </button>
      <button onclick="showTextInput()"
              class="w-14 h-14 flex items-center justify-center text-slate-400 hover:text-slate-600 transition"
              aria-label="키보드 입력">
        <i class="fa-regular fa-keyboard" style="font-size:24px"></i>
      </button>
    </div>

    <!-- Recording state: waveform + done button in one row -->
    <div id="voice-recording" class="hidden flex items-center gap-2">
      <!-- Symmetric waveform -->
      <div class="flex-1 h-12 bg-slate-50 rounded-full flex items-center px-3 gap-[2px] overflow-hidden" id="waveform-container">
        <span class="w-2.5 h-2.5 bg-rose-500 rounded-full animate-pulse shrink-0 mr-1.5"></span>
        <div class="waveform-bar"></div><div class="waveform-bar"></div><div class="waveform-bar"></div><div class="waveform-bar"></div>
        <div class="waveform-bar"></div><div class="waveform-bar"></div><div class="waveform-bar"></div><div class="waveform-bar"></div>
        <div class="waveform-bar"></div><div class="waveform-bar"></div><div class="waveform-bar"></div><div class="waveform-bar"></div>
        <div class="waveform-bar"></div><div class="waveform-bar"></div><div class="waveform-bar"></div><div class="waveform-bar"></div>
        <div class="waveform-bar"></div><div class="waveform-bar"></div><div class="waveform-bar"></div><div class="waveform-bar"></div>
        <div class="waveform-bar"></div><div class="waveform-bar"></div><div class="waveform-bar"></div><div class="waveform-bar"></div>
        <span id="rec-timer" class="text-xs font-mono text-rose-500 shrink-0 ml-1.5 min-w-[32px] text-right">00:00</span>
      </div>
      <!-- Stop button -->
      <button id="rec-done-btn"
              onclick="toggleRecording()"
              class="shrink-0 self-center text-rose-500 hover:text-rose-600 active:scale-95 transition-all"
              aria-label="녹음 정지">
        <i class="fa-solid fa-circle-stop" style="font-size:40px"></i>
      </button>
    </div>

    <!-- Processing state: spinner -->
    <div id="voice-processing" class="hidden flex flex-col items-center gap-3 py-2">
      <div class="w-10 h-10 border-3 border-slate-200 border-t-ink3 rounded-full animate-spin"></div>
      <span class="text-xs font-bold uppercase tracking-widest text-slate-500">음성 인식 중...</span>
    </div>

    <!-- Text input (hidden by default) -->
    <div id="text-input-area" class="hidden">
      <div class="flex items-center gap-2">
        <button onclick="hideTextInput()" class="text-slate-400 hover:text-ink3 shrink-0 w-10 h-10 flex items-center justify-center" aria-label="음성 입력으로 전환">
          <i class="fa-solid fa-microphone" style="font-size:18px"></i>
        </button>
        <input id="chat-input"
               type="text"
               placeholder="텍스트로 입력하세요..."
               class="flex-1 border border-slate-200 rounded-full px-4 py-2.5 text-sm font-medium
                      focus:outline-none focus:border-ink3 focus:ring-2 focus:ring-ink3/10"
               onkeydown="if(event.key==='Enter'&&!event.isComposing)sendMessage()">
        <button onclick="sendMessage()"
                class="w-10 h-10 flex items-center justify-center rounded-lg bg-ink3 text-white hover:bg-ink2 transition shrink-0"
                aria-label="전송">
          <i class="fa-solid fa-arrow-up" style="font-size:18px"></i>
        </button>
      </div>
    </div>
  </div>
</div>

<style>
  /* Desktop: centered popup instead of full-width bottom sheet */
  @media (min-width: 1024px) {
    #chatbot-modal {
      inset: auto !important;
      bottom: 24px !important;
      left: 50% !important;
      right: auto !important;
      width: 420px !important;
      height: 560px !important;
      border-radius: 16px !important;
    }
  }
  /* Slide animation: closed state (off-screen below) */
  #chatbot-modal.slide-closed {
    transform: translateY(100%);
  }
  @media (min-width: 1024px) {
    #chatbot-modal.slide-closed {
      transform: translateX(-50%) translateY(100%);
    }
  }
  /* Slide animation: open state */
  #chatbot-modal.slide-open {
    transform: translateY(0);
  }
  @media (min-width: 1024px) {
    #chatbot-modal.slide-open {
      transform: translateX(-50%) translateY(0);
    }
  }
  #chatbot-modal {
    transition: transform 0.3s ease-out;
  }
  .waveform-bar {
    flex: 1;
    min-width: 2px;
    max-width: 4px;
    height: 4px;
    min-height: 4px;
    background: #F43F5E;
    border-radius: 9999px;
    transition: height 0.06s ease-out;
  }
  .border-3 { border-width: 3px; }
</style>
