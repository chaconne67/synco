{# Modal: Skip an ActionItem — R1-08 #}
<div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title-action-skip"
     class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-sm"
     hx-on:click="if (event.target === this) document.getElementById('modal-container').innerHTML = ''"
     hx-on:keydown.escape="document.getElementById('modal-container').innerHTML = ''">
  <div class="w-full max-w-lg max-h-[90vh] overflow-y-auto rounded-2xl border border-slate-800 bg-slate-900 p-6 shadow-xl">
    <header class="mb-4 flex items-center justify-between">
      <h2 id="modal-title-action-skip" class="text-lg font-semibold text-slate-100">액션 건너뛰기</h2>
      <button type="button"
              onclick="document.getElementById('modal-container').innerHTML = ''"
              class="text-slate-500 hover:text-slate-300">&#10005;</button>
    </header>

    <div class="mb-4 rounded-lg border border-slate-800 bg-slate-800/50 p-3">
      <p class="text-sm text-slate-200">{{ action.action_type.label_ko }}</p>
      <p class="mt-1 text-xs text-slate-400">{{ action.title }}</p>
      <p class="mt-1 text-xs text-slate-500">{{ action.application.candidate.name }}</p>
    </div>

    {% if form.non_field_errors %}
      <div class="mb-3 rounded-md border border-red-500/30 bg-red-950/20 p-3 text-xs text-red-300">
        {% for error in form.non_field_errors %}{{ error }}{% endfor %}
      </div>
    {% endif %}

    <form hx-post="{% url 'projects:action_skip' action.id %}"
          hx-target="#modal-container"
          hx-swap="innerHTML">
      {% csrf_token %}
      <div class="space-y-4">
        <label class="block">
          <span class="text-sm text-slate-300">사유 (선택)</span>
          <textarea name="note" rows="2"
                    class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-800 px-3 py-2.5 text-sm text-slate-100 focus:border-teal-500 focus:ring-1 focus:ring-teal-500"
                    placeholder="건너뛰는 이유를 입력하세요">{{ form.note.value|default:"" }}</textarea>
        </label>
      </div>

      <div class="mt-6 flex justify-end gap-2">
        <button type="button"
                onclick="document.getElementById('modal-container').innerHTML = ''"
                class="rounded-md bg-slate-700 px-4 py-2 text-sm text-slate-200 hover:bg-slate-600">
          취소
        </button>
        <button type="submit"
                class="rounded-md bg-amber-600 px-4 py-2 text-sm font-medium text-white hover:bg-amber-500">
          건너뛰기
        </button>
      </div>
    </form>
  </div>
</div>
