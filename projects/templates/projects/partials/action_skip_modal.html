{# Modal: Skip an ActionItem #}
<div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title-action-skip"
     class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4"
     hx-on:click="if (event.target === this) document.getElementById('modal-container').innerHTML = ''"
     hx-on:keydown.escape="document.getElementById('modal-container').innerHTML = ''">
  <div class="w-full max-w-lg max-h-[90vh] overflow-y-auto rounded-xl bg-white shadow-2xl shadow-slate-900/20 p-8">
    <header class="mb-5 flex items-center justify-between">
      <h3 id="modal-title-action-skip" class="text-xs font-black tracking-[0.2em] text-faint uppercase">액션 건너뛰기 · Skip</h3>
      <button type="button"
              onclick="document.getElementById('modal-container').innerHTML = ''"
              class="w-8 h-8 rounded-lg flex items-center justify-center text-faint hover:text-slate-900 hover:bg-slate-50 transition-colors">&#10005;</button>
    </header>

    <div class="mb-5 rounded-xl border border-slate-100 bg-slate-50/60 p-4">
      <p class="text-xs font-bold uppercase tracking-widest text-faint">{{ action.action_type.label_ko }}</p>
      <p class="mt-2 text-sm font-bold text-slate-900">{{ action.title }}</p>
      <p class="mt-1 text-xs text-muted">{{ action.application.candidate.name }}</p>
    </div>

    {% if form.non_field_errors %}
      <div class="mb-4 rounded-xl border border-rose-100 bg-rose-50 p-3 text-xs font-semibold text-rose-600">
        {% for error in form.non_field_errors %}{{ error }}{% endfor %}
      </div>
    {% endif %}

    <form hx-post="{% url 'projects:action_skip' action.id %}"
          hx-target="#modal-container"
          hx-swap="innerHTML">
      {% csrf_token %}
      <div>
        <label class="block text-xs font-bold uppercase tracking-widest text-faint mb-2">사유 (선택)</label>
        <textarea name="note" rows="2"
                  class="w-full rounded-xl bg-slate-50 border border-transparent focus:border-ink3 focus:bg-white px-4 py-3 text-sm text-slate-900 placeholder:text-faint focus:outline-none focus:ring-2 focus:ring-ink3/10 transition"
                  placeholder="건너뛰는 이유를 입력하세요">{{ form.note.value|default:"" }}</textarea>
      </div>

      <div class="mt-6 flex justify-end gap-2">
        <button type="button"
                onclick="document.getElementById('modal-container').innerHTML = ''"
                class="rounded-xl bg-white border border-slate-200 text-slate-700 text-xs font-bold uppercase tracking-widest px-5 py-2.5 hover:bg-slate-50 transition-all">
          취소
        </button>
        <button type="submit"
                class="rounded-xl bg-amber-600 text-white text-xs font-bold uppercase tracking-widest px-5 py-2.5 shadow-sm hover:bg-amber-700 transition-all">
          건너뛰기
        </button>
      </div>
    </form>
  </div>
</div>
