<!-- Kanban Card -->
<div class="kanban-card bg-white rounded-lg border border-gray-200 p-3 cursor-grab active:cursor-grabbing hover:border-gray-300 hover:shadow-sm transition"
     data-project-id="{{ project.pk }}">
  <a href="{% url 'projects:project_detail' project.pk %}"
     hx-get="{% url 'projects:project_detail' project.pk %}" hx-target="#main-content" hx-push-url="true"
     class="block" onclick="event.stopPropagation()">
    <h4 class="text-[14px] font-semibold text-gray-900 truncate">{{ project.title }}</h4>
    <div class="flex items-center gap-2 mt-1.5">
      <span class="text-[12px] text-gray-500">{{ project.client.name }}</span>
      <span class="text-[12px] text-gray-400">·</span>
      <span class="text-[12px] {% if project.days_elapsed > 20 %}text-red-500 font-medium{% elif project.days_elapsed > 10 %}text-yellow-600{% else %}text-gray-500{% endif %}">
        {{ project.days_elapsed }}일
      </span>
    </div>
  </a>
  {% if project.status == "pending_approval" %}
  <div class="flex items-center gap-2 mt-1">
    <span class="inline-flex items-center px-2 py-0.5 rounded text-[12px] font-medium bg-yellow-100 text-yellow-800">
      승인 대기중
    </span>
    <form method="post" action="{% url 'projects:approval_cancel' pk=project.pk %}" class="inline">
      {% csrf_token %}
      <button type="submit" class="text-[12px] text-red-500 hover:text-red-700 underline"
              onclick="return confirm('승인 요청을 취소하시겠습니까?')">취소</button>
    </form>
  </div>
  {% endif %}
</div>
