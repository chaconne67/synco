{# Phase C — 이력서 준비 단계 전용 방법 선택 UI #}
<div class="mt-2 p-4 rounded-lg bg-ink3/5 border border-ink3/20">
  <p class="text-xs text-muted mb-3">
    이력서를 어떻게 준비하시겠어요? 한 가지 방법을 선택하세요.
  </p>
  <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
    {# ① DB 재사용 — 후보자 current_resume 있을 때만 활성 #}
    {% if application.candidate.current_resume %}
    <button hx-post="{% url 'projects:application_resume_use_db' application.id %}"
            hx-swap="none"
            class="text-left p-3 rounded-lg bg-surface border border-hair hover:border-ink3 transition-colors group"
            title="이 후보자의 DB에 이미 저장된 이력서를 이 프로젝트에서도 사용합니다">
      <div class="text-xs font-bold text-ink mb-1">① DB 기존 이력서 사용</div>
      <p class="text-xs text-muted">{{ application.candidate.current_resume.filename|default:"등록된 이력서"|truncatechars:30 }}</p>
    </button>
    {% else %}
    <div class="p-3 rounded-lg bg-line border border-hair opacity-50 cursor-not-allowed"
         title="이 후보자에게 아직 등록된 이력서가 없습니다">
      <div class="text-xs font-bold text-faint mb-1">① DB 기존 이력서 사용</div>
      <p class="text-xs text-faint">등록된 이력서 없음</p>
    </div>
    {% endif %}

    {# ② 이메일 요청 #}
    <button hx-get="{% url 'projects:application_resume_request_email' application.id %}"
            hx-target="#modal-container" hx-swap="innerHTML"
            class="text-left p-3 rounded-lg bg-surface border border-hair hover:border-ink3 transition-colors group"
            title="후보자에게 이메일로 이력서를 요청합니다. 할 일 목록에 대기 항목으로 추가됩니다">
      <div class="text-xs font-bold text-ink mb-1">② 이메일로 요청</div>
      <p class="text-xs text-muted">할 일 목록에 대기 항목 추가</p>
    </button>

    {# ③ 직접 업로드 #}
    <button hx-get="{% url 'projects:application_resume_upload' application.id %}"
            hx-target="#modal-container" hx-swap="innerHTML"
            class="text-left p-3 rounded-lg bg-surface border border-hair hover:border-ink3 transition-colors group"
            title="이미 받은 파일을 직접 업로드합니다">
      <div class="text-xs font-bold text-ink mb-1">③ 파일 직접 업로드</div>
      <p class="text-xs text-muted">PDF · Word · HWP</p>
    </button>
  </div>
</div>
