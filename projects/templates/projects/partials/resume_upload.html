<!-- P18: Resume drag & drop upload zone -->
<div id="resume-upload-zone" class="space-y-3">
  <div id="drop-zone"
       class="border-2 border-dashed border-slate-200 rounded-lg p-6 text-center cursor-pointer
              hover:border-ink3 hover:bg-ink3/5 transition-all"
       data-upload-url="{% url 'projects:resume_upload' project.pk %}"
       data-process-url="{% url 'projects:resume_process_pending' project.pk %}"
       data-status-url="{% url 'projects:resume_upload_status' project.pk %}">
    <svg class="w-10 h-10 text-slate-500 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
    </svg>
    <p class="text-sm text-slate-500 mb-1">이력서 파일을 드래그하거나 클릭하여 업로드하세요</p>
    <p class="text-xs text-slate-400">PDF, DOCX, DOC (최대 20MB)</p>
    <input type="file" id="resume-file-input" multiple accept=".pdf,.docx,.doc"
           class="hidden">
  </div>

  <!-- Upload status will be rendered here -->
  <div id="resume-status-container"></div>
</div>
