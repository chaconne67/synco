<section class="bg-white rounded-xl shadow-sm border border-slate-100 p-6">
  <div class="flex items-center justify-between mb-5">
    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">오늘의 액션 · Today</h3>
    <button hx-get="/dashboard/actions/" hx-target="#dash-actions" hx-swap="innerHTML"
            class="text-xs font-bold text-ink3 uppercase tracking-widest hover:text-ink2 transition-colors">Refresh</button>
  </div>
  {% if today_actions %}
  <ul class="divide-y divide-slate-100">
    {% for action in today_actions %}
    <li class="flex items-center justify-between py-3">
      <div class="flex items-center gap-3 min-w-0">
        <span class="w-1.5 h-1.5 rounded-full bg-rose-500 shrink-0"></span>
        <span class="text-sm font-bold text-slate-900 truncate">{{ action.label }}</span>
        <span class="text-xs text-slate-500 truncate">{{ action.project.title }}</span>
      </div>
      <span class="text-xs font-medium text-slate-400 shrink-0 ml-4">{{ action.detail }}</span>
    </li>
    {% endfor %}
  </ul>
  {% else %}
  <p class="text-xs font-medium text-slate-400 text-center py-6">
    {% if is_owner %}오늘 긴급한 액션이 없습니다.{% else %}배정된 업무가 없습니다.{% endif %}
  </p>
  {% endif %}
</section>
