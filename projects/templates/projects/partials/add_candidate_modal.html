{# Modal: Add candidate to project #}
<div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title-add-candidate"
     class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-sm"
     hx-on:click="if (event.target === this) document.getElementById('modal-container').innerHTML = ''"
     hx-on:keydown.escape="document.getElementById('modal-container').innerHTML = ''">
  <div class="w-full max-w-2xl max-h-[85vh] overflow-y-auto rounded-2xl border border-slate-800 bg-slate-900 p-6 shadow-xl">
    <header class="mb-4 flex items-center justify-between">
      <h2 id="modal-title-add-candidate" class="text-lg font-semibold text-slate-100">후보자 추가</h2>
      <button type="button"
              onclick="document.getElementById('modal-container').innerHTML = ''"
              class="text-slate-500 hover:text-slate-300">&#10005;</button>
    </header>

    {# Tab stubs — only DB search active in v1 #}
    <div class="mb-4 flex gap-1 border-b border-slate-800">
      <button type="button"
              class="border-b-2 border-teal-500 px-4 py-2 text-sm text-teal-300">
        DB 검색
      </button>
      <button type="button" class="px-4 py-2 text-sm text-slate-500" disabled>
        파일 업로드 (준비 중)
      </button>
      <button type="button" class="px-4 py-2 text-sm text-slate-500" disabled>
        Drive (준비 중)
      </button>
    </div>

    {% if form.non_field_errors %}
      <div class="mb-3 rounded-md border border-red-500/30 bg-red-950/20 p-3 text-xs text-red-300">
        {% for error in form.non_field_errors %}{{ error }}{% endfor %}
      </div>
    {% endif %}

    <form hx-post="{% url 'projects:project_add_candidate' project.id %}"
          hx-target="#modal-container"
          hx-swap="innerHTML">
      {% csrf_token %}
      <div class="space-y-4">
        <label class="block">
          <span class="text-sm text-slate-300">후보자 선택</span>
          <select name="candidate"
                  class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-800 px-3 py-2.5 text-sm text-slate-100 focus:border-teal-500 focus:ring-1 focus:ring-teal-500">
            <option value="">---------</option>
            {% for choice in form.candidate.field.queryset %}
              <option value="{{ choice.pk }}" {% if form.candidate.value|slugify == choice.pk|slugify %}selected{% endif %}>{{ choice }}</option>
            {% endfor %}
          </select>
          {% if form.candidate.errors %}
            <p class="mt-1 text-xs text-red-400">{{ form.candidate.errors.0 }}</p>
          {% endif %}
        </label>
        <label class="block">
          <span class="text-sm text-slate-300">메모 (선택)</span>
          <textarea name="notes" rows="2"
                    class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-800 px-3 py-2.5 text-sm text-slate-100 focus:border-teal-500 focus:ring-1 focus:ring-teal-500">{{ form.notes.value|default:"" }}</textarea>
        </label>
      </div>
      <div class="mt-6 flex justify-end gap-2">
        <button type="button"
                onclick="document.getElementById('modal-container').innerHTML = ''"
                class="rounded-md bg-slate-700 px-4 py-2 text-sm text-slate-200 hover:bg-slate-600">
          취소
        </button>
        <button type="submit"
                class="rounded-md bg-teal-600 px-4 py-2 text-sm font-medium text-white hover:bg-teal-500">
          추가
        </button>
      </div>
    </form>
  </div>
</div>
