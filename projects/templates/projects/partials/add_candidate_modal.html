{# Modal: Add candidate to project #}
<div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title-add-candidate"
     class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4"
     hx-on:click="if (event.target === this) document.getElementById('modal-container').innerHTML = ''"
     hx-on:keydown.escape="document.getElementById('modal-container').innerHTML = ''">
  <div class="w-full max-w-2xl max-h-[90vh] overflow-y-auto rounded-xl bg-white shadow-2xl shadow-slate-900/20 p-8">
    <header class="mb-5 flex items-center justify-between">
      <h3 id="modal-title-add-candidate" class="text-[11px] font-black tracking-[0.2em] text-slate-400 uppercase">후보자 추가 · Add</h3>
      <button type="button"
              onclick="document.getElementById('modal-container').innerHTML = ''"
              class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-slate-900 hover:bg-slate-50 transition-colors">&#10005;</button>
    </header>

    <div class="mb-5 bg-slate-50 rounded-xl p-1 inline-flex items-center gap-1">
      <button type="button"
              class="px-4 py-2 text-[10px] font-bold uppercase tracking-widest bg-white text-slate-900 rounded-lg shadow-sm">
        DB 검색
      </button>
      <button type="button" class="px-4 py-2 text-[10px] font-bold uppercase tracking-widest text-slate-400 cursor-not-allowed" disabled>
        파일 업로드
      </button>
      <button type="button" class="px-4 py-2 text-[10px] font-bold uppercase tracking-widest text-slate-400 cursor-not-allowed" disabled>
        Drive
      </button>
    </div>

    {% if form.non_field_errors %}
      <div class="mb-4 rounded-xl border border-rose-100 bg-rose-50 p-3 text-xs font-semibold text-rose-600">
        {% for error in form.non_field_errors %}{{ error }}{% endfor %}
      </div>
    {% endif %}

    <form hx-post="{% url 'projects:project_add_candidate' project.id %}"
          hx-target="#modal-container"
          hx-swap="innerHTML">
      {% csrf_token %}
      <div class="space-y-5">
        <div>
          <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2">후보자 선택</label>
          <select name="candidate"
                  class="w-full rounded-xl bg-slate-50 border border-transparent focus:border-primary focus:bg-white px-4 py-3 text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-primary/10 transition">
            <option value="">---------</option>
            {% for choice in form.candidate.field.queryset %}
              <option value="{{ choice.pk }}" {% if form.candidate.value|slugify == choice.pk|slugify %}selected{% endif %}>{{ choice }}</option>
            {% endfor %}
          </select>
          {% if form.candidate.errors %}
            <p class="mt-2 text-xs font-semibold text-rose-600">{{ form.candidate.errors.0 }}</p>
          {% endif %}
        </div>
        <div>
          <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2">메모 (선택)</label>
          <textarea name="notes" rows="2"
                    class="w-full rounded-xl bg-slate-50 border border-transparent focus:border-primary focus:bg-white px-4 py-3 text-sm text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/10 transition">{{ form.notes.value|default:"" }}</textarea>
        </div>
      </div>
      <div class="mt-6 flex justify-end gap-2">
        <button type="button"
                onclick="document.getElementById('modal-container').innerHTML = ''"
                class="rounded-xl bg-white border border-slate-200 text-slate-700 text-[10px] font-bold uppercase tracking-widest px-5 py-2.5 hover:bg-slate-50 transition-all">
          취소
        </button>
        <button type="submit"
                class="rounded-xl bg-primary text-white text-[10px] font-bold uppercase tracking-widest px-5 py-2.5 shadow-sm hover:bg-primary-dark hover:scale-[1.02] active:scale-[0.98] transition-all">
          추가
        </button>
      </div>
    </form>
  </div>
</div>
