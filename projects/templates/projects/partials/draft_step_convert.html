{# 변환 옵션 (마스킹, 언어) + 변환 버튼 (REVIEWED 상태) #}
<div class="space-y-4">

  <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-6 space-y-4">
    <h2 class="text-lg font-bold text-slate-900">제출용 파일 변환</h2>
    <p class="text-sm text-slate-600">
      마스킹 설정과 언어를 선택한 후 Word 파일로 변환합니다.
    </p>

    <form hx-post="{% url 'projects:draft_convert' project.pk submission.pk %}"
          hx-target="#draft-content"
          hx-swap="innerHTML"
          hx-indicator="#convert-spinner">
      {% csrf_token %}

      {# 마스킹 설정 #}
      <div class="space-y-3 mb-4">
        <h3 class="text-sm font-semibold text-slate-700">마스킹 설정</h3>
        <div class="grid grid-cols-2 gap-3">
          <label class="flex items-center gap-2 text-sm text-slate-600">
            <input type="checkbox" name="mask_salary"
              {% if draft.masking_config.salary %}checked{% endif %}
              class="rounded border-slate-300 text-primary focus:ring-primary">
            연봉 정보
          </label>
          <label class="flex items-center gap-2 text-sm text-slate-600">
            <input type="checkbox" name="mask_birth_detail"
              {% if draft.masking_config.birth_detail %}checked{% endif %}
              class="rounded border-slate-300 text-primary focus:ring-primary">
            생년월일
          </label>
          <label class="flex items-center gap-2 text-sm text-slate-600">
            <input type="checkbox" name="mask_contact"
              {% if draft.masking_config.contact %}checked{% endif %}
              class="rounded border-slate-300 text-primary focus:ring-primary">
            연락처 (이메일, 전화, 주소)
          </label>
          <label class="flex items-center gap-2 text-sm text-slate-600">
            <input type="checkbox" name="mask_current_company"
              {% if draft.masking_config.current_company %}checked{% endif %}
              class="rounded border-slate-300 text-primary focus:ring-primary">
            현 직장
          </label>
        </div>
      </div>

      {# 언어 선택 #}
      <div class="mb-4">
        <h3 class="text-sm font-semibold text-slate-700 mb-2">출력 언어</h3>
        <select name="output_language"
                class="w-full border border-slate-100 rounded-xl px-3 py-2.5 text-sm focus:ring-2 focus:ring-primary focus:border-primary">
          <option value="ko" {% if draft.output_language == 'ko' %}selected{% endif %}>국문</option>
          <option value="en" {% if draft.output_language == 'en' %}selected{% endif %}>영문</option>
          <option value="ko_en" {% if draft.output_language == 'ko_en' %}selected{% endif %}>국영문</option>
        </select>
      </div>

      {# 변환 시 masking_config을 JSON으로 구성하는 hidden field는 JS로 처리 #}
      <input type="hidden" name="masking_config" id="masking-config-input">

      <div class="flex justify-end">
        <button type="submit"
                onclick="document.getElementById('masking-config-input').value = JSON.stringify({
                  salary: document.querySelector('[name=mask_salary]').checked,
                  birth_detail: document.querySelector('[name=mask_birth_detail]').checked,
                  contact: document.querySelector('[name=mask_contact]').checked,
                  current_company: document.querySelector('[name=mask_current_company]').checked
                });"
                class="inline-flex items-center gap-2 px-4 py-2.5 bg-primary text-white rounded-lg text-sm font-medium hover:bg-primary/90 transition">
          Word 파일 변환
          <span id="convert-spinner" class="htmx-indicator">
            <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
          </span>
        </button>
      </div>
    </form>
  </div>

  {# 미리보기 + 재정리 링크 #}
  <div class="flex items-center gap-4">
    <a href="{% url 'projects:draft_preview' project.pk submission.pk %}"
       hx-get="{% url 'projects:draft_preview' project.pk submission.pk %}"
       hx-target="#draft-content"
       class="text-sm text-primary hover:text-primary/80 font-medium">
      미리보기
    </a>
    <form hx-post="{% url 'projects:draft_finalize' project.pk submission.pk %}"
          hx-target="#draft-content"
          hx-swap="innerHTML"
          class="inline">
      {% csrf_token %}
      <button type="submit"
              class="text-sm text-slate-500 hover:text-slate-700 underline">
        AI 재정리
      </button>
    </form>
  </div>

</div>
