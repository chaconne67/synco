{# Phase B — 이력서 파일 직접 업로드 모달 #}
<div class="fixed inset-0 bg-ink/50 flex items-center justify-center z-50"
     onclick="if (event.target === this) document.getElementById('modal-container').innerHTML = ''">
  <div class="bg-surface rounded-card shadow-lift w-[480px] max-w-[90vw] p-8">
    <h3 class="text-xl font-bold tracking-tight mb-2">이력서 파일 업로드</h3>
    <p class="text-sm text-muted mb-6">
      <span class="font-semibold text-ink3">{{ application.candidate.name }}</span> 후보자의 이력서 파일을 업로드합니다.
      PDF, Word, HWP 지원.
    </p>

    <form hx-post="{% url 'projects:application_resume_upload' application.id %}"
          hx-swap="none"
          hx-encoding="multipart/form-data">
      {% csrf_token %}
      <input type="file" name="resume_file" required
             accept=".pdf,.doc,.docx,.hwp"
             class="w-full px-3 py-2 rounded-lg border border-hair bg-surface text-sm text-ink3 file:mr-3 file:px-3 file:py-1.5 file:rounded-lg file:border-0 file:bg-ink3 file:text-white file:text-xs file:font-semibold file:cursor-pointer cursor-pointer">

      <div class="flex items-center justify-end gap-2 mt-6">
        <button type="button"
                onclick="document.getElementById('modal-container').innerHTML = ''"
                class="inline-flex items-center px-4 h-10 rounded-lg border border-hair text-sm font-semibold text-muted hover:text-ink hover:bg-line transition-colors">
          취소
        </button>
        <button type="submit"
                class="inline-flex items-center px-4 h-10 rounded-lg bg-ink3 text-white text-sm font-semibold hover:bg-ink2 transition-colors"
                onclick="setTimeout(() => document.getElementById('modal-container').innerHTML = '', 200)">
          업로드
        </button>
      </div>
    </form>
  </div>
</div>
