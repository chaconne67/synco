<section class="bg-white rounded-xl shadow-sm border border-slate-100 p-6">
  <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-5">이번 주 · This Week</h3>
  {% if weekly_schedule %}
  <div class="space-y-3">
    {% for action in weekly_schedule %}
    <div class="flex items-start gap-4 p-4 rounded-xl bg-slate-50/60 hover:bg-slate-50 transition-colors">
      <span class="w-2 h-2 rounded-full bg-amber-500 shrink-0 mt-2"></span>
      <div class="flex-1 min-w-0">
        <div class="flex items-center justify-between gap-4">
          <p class="text-sm font-bold text-slate-900 truncate">{{ action.label }}</p>
          <span class="text-xs font-bold text-slate-400 uppercase tracking-widest shrink-0">{{ action.detail }}</span>
        </div>
        <p class="text-xs text-slate-500 mt-1 truncate">{{ action.project.title }}</p>
      </div>
    </div>
    {% endfor %}
  </div>
  {% else %}
  <p class="text-xs font-medium text-slate-400 text-center py-6">
    {% if is_owner %}이번 주 일정이 없습니다.{% else %}배정된 일정이 없습니다.{% endif %}
  </p>
  {% endif %}
</section>
