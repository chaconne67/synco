{# Filter bar for project list #}
<div class="mb-8">
  <form method="get" action="{% url 'projects:project_list' %}"
        hx-get="{% url 'projects:project_list' %}" hx-target="#main-content" hx-push-url="true"
        class="flex flex-wrap gap-3 items-center">

    <select name="phase"
            class="rounded-xl border border-slate-200 bg-white px-4 py-2.5 text-xs font-bold uppercase tracking-wider text-slate-700 focus:border-primary focus:ring-2 focus:ring-primary/10 outline-none transition"
            hx-get="{% url 'projects:project_list' %}" hx-target="#main-content" hx-push-url="true"
            hx-include="closest form">
      <option value="">전체 단계</option>
      <option value="searching" {% if phase_filter == "searching" %}selected{% endif %}>서칭</option>
      <option value="screening" {% if phase_filter == "screening" %}selected{% endif %}>심사</option>
      <option value="closed" {% if phase_filter == "closed" %}selected{% endif %}>종료</option>
    </select>

    {% if is_owner %}
      <select name="consultant"
              class="rounded-xl border border-slate-200 bg-white px-4 py-2.5 text-xs font-bold uppercase tracking-wider text-slate-700 focus:border-primary focus:ring-2 focus:ring-primary/10 outline-none transition"
              hx-get="{% url 'projects:project_list' %}" hx-target="#main-content" hx-push-url="true"
              hx-include="closest form">
        <option value="">담당자 전체</option>
      </select>
    {% endif %}

    <select name="client"
            class="rounded-xl border border-slate-200 bg-white px-4 py-2.5 text-xs font-bold uppercase tracking-wider text-slate-700 focus:border-primary focus:ring-2 focus:ring-primary/10 outline-none transition"
            hx-get="{% url 'projects:project_list' %}" hx-target="#main-content" hx-push-url="true"
            hx-include="closest form">
      <option value="">고객사 전체</option>
      {% for client in clients %}
        <option value="{{ client.pk }}" {% if client_filter == client.pk|slugify %}selected{% endif %}>{{ client.name }}</option>
      {% endfor %}
    </select>
  </form>
</div>
