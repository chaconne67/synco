<!-- Shared Filters -->
<form method="get" action="{% url 'projects:project_list' %}"
      hx-get="{% url 'projects:project_list' %}" hx-target="#main-content" hx-push-url="true"
      class="flex flex-wrap gap-2">
  <input type="hidden" name="view" value="{{ view_type }}">
  <!-- Scope -->
  <select name="scope"
          class="border border-gray-300 rounded-lg px-3 py-2.5 text-[15px] focus:ring-2 focus:ring-primary focus:border-primary">
    <option value="mine" {% if scope == "mine" %}selected{% endif %}>내 프로젝트</option>
    <option value="all" {% if scope == "all" %}selected{% endif %}>전체</option>
  </select>
  <!-- Client -->
  <select name="client"
          class="border border-gray-300 rounded-lg px-3 py-2.5 text-[15px] focus:ring-2 focus:ring-primary focus:border-primary">
    <option value="">고객사 전체</option>
    {% for client in clients %}
    <option value="{{ client.pk }}" {% if current_client == client.pk|slugify %}selected{% endif %}>{{ client.name }}</option>
    {% endfor %}
  </select>
  <!-- Status -->
  <select name="status"
          class="border border-gray-300 rounded-lg px-3 py-2.5 text-[15px] focus:ring-2 focus:ring-primary focus:border-primary">
    <option value="">상태 전체</option>
    {% for value, label in status_choices %}
    <option value="{{ value }}" {% if current_status == value %}selected{% endif %}>{{ label }}</option>
    {% endfor %}
  </select>
  <!-- Sort -->
  <select name="sort"
          class="border border-gray-300 rounded-lg px-3 py-2.5 text-[15px] focus:ring-2 focus:ring-primary focus:border-primary">
    <option value="days_desc" {% if current_sort == "days_desc" %}selected{% endif %}>경과일 많은 순</option>
    <option value="days_asc" {% if current_sort == "days_asc" %}selected{% endif %}>경과일 적은 순</option>
    <option value="created" {% if current_sort == "created" %}selected{% endif %}>최신 등록순</option>
  </select>
  <button type="submit"
          class="bg-gray-100 text-gray-700 font-medium py-2.5 px-4 rounded-lg text-[15px] hover:bg-gray-200 transition">
    필터
  </button>
</form>
