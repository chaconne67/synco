services:
  db:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: synco
      POSTGRES_USER: synco
      POSTGRES_PASSWORD: bwv100$$
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synco"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    # 배포 전용. 개발 시에는 사용하지 않음 (호스트에서 Django 직접 실행).
    # 사용 시: docker compose --profile deploy up web
    profiles: ["deploy"]
    build: .
    restart: unless-stopped
    ports:
      - "8080:8000"  # 호스트 8080 → 컨테이너 8000. 개발 서버(8000)와 겹치지 않음.
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://synco:bwv100$$@db:5432/synco
    volumes:
      # 개발 시 코드 변경 즉시 반영
      - .:/app
      - /app/.venv
      # claude CLI 인증 + 설정
      - ~/.claude:/root/.claude
      - ~/.claude.json:/root/.claude.json
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"

volumes:
  pgdata:
