services:
  db:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: synco
      POSTGRES_USER: synco
      POSTGRES_PASSWORD: bwv100$$
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synco"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://synco:bwv100$$@db:5432/synco
    volumes:
      # 개발 시 코드 변경 즉시 반영
      - .:/app
      - /app/.venv
      # claude CLI 인증 + 설정
      - ~/.claude:/root/.claude
      - ~/.claude.json:/root/.claude.json
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"

volumes:
  pgdata:
