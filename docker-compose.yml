services:
  db:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-synco}
      POSTGRES_USER: ${POSTGRES_USER:-synco}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synco"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    # 컨테이너 이미지로만 실행하는 배포 검증용 웹 서비스.
    # 사용 전: docker compose run --rm web python manage.py migrate
    profiles: ["deploy"]
    build: .
    restart: unless-stopped
    ports:
      - "8080:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-synco}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-synco}
    command: gunicorn main.wsgi:application --bind 0.0.0.0:8000
    healthcheck:
      test: ["CMD-SHELL", "python manage.py check --deploy --fail-level WARNING"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
