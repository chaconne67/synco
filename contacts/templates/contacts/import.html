{% extends request.htmx|yesno:"common/base_partial.html,common/base.html" %}

{% block title %}엑셀 임포트 - synco{% endblock %}

{% block content %}
<div class="px-4 pt-6">

  <!-- Header -->
  <div class="flex items-center gap-3 mb-5">
    <a href="{% url 'contacts:list' %}"
       hx-get="{% url 'contacts:list' %}"
       hx-target="#main-content"
       hx-push-url="true"
       class="text-gray-400 hover:text-gray-600">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
    <h1 class="text-lg font-bold">엑셀 임포트</h1>
  </div>

  {% if error %}
  <div class="bg-red-50 border border-red-200 rounded-2xl p-4 mb-5">
    <p class="text-sm text-red-700">{{ error }}</p>
  </div>
  {% endif %}

  <!-- Upload form -->
  <form method="post" action="{% url 'contacts:import' %}" enctype="multipart/form-data">
    {% csrf_token %}

    <!-- File upload area -->
    <label class="block mb-6 cursor-pointer">
      <div id="upload-area"
           class="border-2 border-dashed border-gray-200 rounded-2xl p-8 text-center hover:border-primary/40 transition">
        <div class="w-14 h-14 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg class="w-7 h-7 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
          </svg>
        </div>
        <p class="text-sm font-medium text-gray-700 mb-1">파일을 선택하세요</p>
        <p class="text-xs text-gray-400">XLSX 파일 (최대 5MB, 1,000건 이하)</p>
        <p id="file-name" class="text-sm text-primary font-medium mt-3 hidden"></p>
        <p id="file-info" class="text-xs mt-1 hidden"></p>
      </div>
      <input type="file"
             name="file"
             accept=".xlsx,.xls"
             required
             class="hidden"
             id="file-input">
    </label>

    <!-- File validation error -->
    <div id="file-error" class="bg-red-50 border border-red-200 rounded-2xl p-4 mb-5 hidden">
      <p class="text-sm text-red-700" id="file-error-msg"></p>
    </div>

    <!-- Instructions -->
    <div class="bg-primary-light rounded-2xl p-4 mb-6">
      <div class="flex items-start gap-3">
        <div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center flex-shrink-0 mt-0.5">
          <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
        </div>
        <div>
          <h3 class="text-sm font-semibold text-primary">AI가 자동으로 분류합니다</h3>
          <p class="text-xs text-primary/70 mt-1 leading-relaxed">어떤 엑셀 양식이든 상관없습니다. AI가 컬럼을 자동으로 인식하고 매핑합니다.</p>
        </div>
      </div>
    </div>

    <!-- Submit -->
    <button type="submit" id="submit-btn" disabled
            class="w-full bg-gray-300 text-white font-semibold py-3 px-5 rounded-xl text-sm transition cursor-not-allowed">
      AI 분류 시작
    </button>
  </form>

</div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.mini.min.js"></script>
<script>
(function() {
  var MAX_ROWS = 1000;
  var MAX_SIZE = 5 * 1024 * 1024;
  var input = document.getElementById('file-input');
  var btn = document.getElementById('submit-btn');
  var nameEl = document.getElementById('file-name');
  var infoEl = document.getElementById('file-info');
  var errBox = document.getElementById('file-error');
  var errMsg = document.getElementById('file-error-msg');

  function setOk(name, rows) {
    nameEl.textContent = name;
    nameEl.classList.remove('hidden');
    infoEl.textContent = rows.toLocaleString() + '건 감지됨';
    infoEl.className = 'text-xs mt-1 text-green-600';
    infoEl.classList.remove('hidden');
    errBox.classList.add('hidden');
    btn.disabled = false;
    btn.className = 'w-full bg-primary text-white font-semibold py-3 px-5 rounded-xl text-sm hover:bg-primary-dark transition';
  }

  function setError(name, msg) {
    nameEl.textContent = name;
    nameEl.classList.remove('hidden');
    infoEl.classList.add('hidden');
    errMsg.textContent = msg;
    errBox.classList.remove('hidden');
    btn.disabled = true;
    btn.className = 'w-full bg-gray-300 text-white font-semibold py-3 px-5 rounded-xl text-sm cursor-not-allowed';
  }

  function setLoading(name) {
    nameEl.textContent = name;
    nameEl.classList.remove('hidden');
    infoEl.textContent = '파일 확인 중...';
    infoEl.className = 'text-xs mt-1 text-gray-500';
    infoEl.classList.remove('hidden');
    errBox.classList.add('hidden');
    btn.disabled = true;
    btn.className = 'w-full bg-gray-300 text-white font-semibold py-3 px-5 rounded-xl text-sm cursor-not-allowed';
  }

  input.addEventListener('change', function() {
    var file = this.files[0];
    if (!file) return;

    if (file.size > MAX_SIZE) {
      setError(file.name, '파일 크기가 5MB를 초과합니다 (' + (file.size / (1024*1024)).toFixed(1) + 'MB).');
      return;
    }

    setLoading(file.name);

    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var wb = XLSX.read(e.target.result, { type: 'array', sheetRows: MAX_ROWS + 50 });

        // Count rows across all sheets
        var totalRows = 0;
        var sheetCount = wb.SheetNames.length;
        for (var s = 0; s < sheetCount; s++) {
          var ws = wb.Sheets[wb.SheetNames[s]];
          var data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

          var headerRow = 0;
          for (var i = 0; i < Math.min(data.length, 20); i++) {
            var filled = 0;
            for (var j = 0; j < data[i].length; j++) {
              if (data[i][j] !== '' && data[i][j] != null) filled++;
            }
            if (filled >= 3) { headerRow = i; break; }
          }

          for (var r = headerRow + 1; r < data.length; r++) {
            var hasData = false;
            for (var c = 0; c < data[r].length; c++) {
              if (data[r][c] !== '' && data[r][c] != null) { hasData = true; break; }
            }
            if (hasData) totalRows++;
          }
        }

        var sheetInfo = sheetCount > 1 ? ' (' + sheetCount + '개 시트)' : '';
        if (totalRows > MAX_ROWS) {
          setError(file.name, '데이터가 ' + totalRows.toLocaleString() + '건입니다. 최대 ' + MAX_ROWS.toLocaleString() + '건까지 임포트 가능합니다.');
        } else if (totalRows === 0) {
          setError(file.name, '데이터가 없는 파일입니다.');
        } else {
          setOk(file.name, totalRows);
          infoEl.textContent = totalRows.toLocaleString() + '건 감지됨' + sheetInfo;
        }
      } catch(ex) {
        // Parsing failed — let server handle it
        setOk(file.name, 0);
        infoEl.textContent = '행 수 확인 불가 — 서버에서 검증합니다';
        infoEl.className = 'text-xs mt-1 text-amber-600';
      }
    };
    reader.readAsArrayBuffer(file);
  });
})();
</script>
{% endblock %}
