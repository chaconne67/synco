<form hx-post="{% url 'contacts:task_create' %}" hx-target="#task-list" hx-swap="innerHTML"
      class="bg-white rounded-lg border border-primary/30 shadow-sm p-4 mb-2">
  {% csrf_token %}
  <div class="flex items-center gap-2">
    <input type="text" name="title" placeholder="업무 내용을 입력하세요"
           class="flex-1 text-[15px] border-0 focus:outline-none focus:ring-0 p-0" required autofocus>
    <input type="date" name="due_date" class="text-sm border border-gray-200 rounded-lg px-2 py-1">
    <button type="submit" class="px-3 py-1.5 bg-primary text-white text-sm font-semibold rounded-lg">저장</button>
    <button type="button" onclick="this.closest('form').remove()"
            class="text-gray-500 hover:text-gray-600 p-2.5 min-w-[44px] min-h-[44px] flex items-center justify-center">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>
</form>
