<!-- Filter chips -->
<div class="flex gap-2 mb-4 overflow-x-auto pb-1 scrollbar-hide">
  <button class="flex-shrink-0 px-4 py-2.5 rounded-full text-sm font-medium {% if not industry %}bg-primary text-white{% else %}bg-gray-100 text-gray-600{% endif %}"
          hx-get="{% url 'contacts:list' %}?q={{ q }}"
          hx-target="#contact-filter-area"
          hx-push-url="{% url 'contacts:list' %}{% if q %}?q={{ q }}{% endif %}">
    전체
  </button>
  <button class="flex-shrink-0 px-4 py-2.5 rounded-full text-sm font-medium {% if industry == '제조' %}bg-primary text-white{% else %}bg-gray-100 text-gray-600{% endif %}"
          hx-get="{% url 'contacts:list' %}?q={{ q }}&industry=제조"
          hx-target="#contact-filter-area"
          hx-push-url="{% url 'contacts:list' %}?industry=제조{% if q %}&q={{ q }}{% endif %}">
    제조
  </button>
  <button class="flex-shrink-0 px-4 py-2.5 rounded-full text-sm font-medium {% if industry == '유통' %}bg-primary text-white{% else %}bg-gray-100 text-gray-600{% endif %}"
          hx-get="{% url 'contacts:list' %}?q={{ q }}&industry=유통"
          hx-target="#contact-filter-area"
          hx-push-url="{% url 'contacts:list' %}?industry=유통{% if q %}&q={{ q }}{% endif %}">
    유통
  </button>
  <button class="flex-shrink-0 px-4 py-2.5 rounded-full text-sm font-medium {% if industry == 'IT' %}bg-primary text-white{% else %}bg-gray-100 text-gray-600{% endif %}"
          hx-get="{% url 'contacts:list' %}?q={{ q }}&industry=IT"
          hx-target="#contact-filter-area"
          hx-push-url="{% url 'contacts:list' %}?industry=IT{% if q %}&q={{ q }}{% endif %}">
    IT
  </button>
  <button class="flex-shrink-0 px-4 py-2.5 rounded-full text-sm font-medium {% if industry == '서비스' %}bg-primary text-white{% else %}bg-gray-100 text-gray-600{% endif %}"
          hx-get="{% url 'contacts:list' %}?q={{ q }}&industry=서비스"
          hx-target="#contact-filter-area"
          hx-push-url="{% url 'contacts:list' %}?industry=서비스{% if q %}&q={{ q }}{% endif %}">
    서비스
  </button>
  <button class="flex-shrink-0 px-4 py-2.5 rounded-full text-sm font-medium {% if industry == '금융' %}bg-primary text-white{% else %}bg-gray-100 text-gray-600{% endif %}"
          hx-get="{% url 'contacts:list' %}?q={{ q }}&industry=금융"
          hx-target="#contact-filter-area"
          hx-push-url="{% url 'contacts:list' %}?industry=금융{% if q %}&q={{ q }}{% endif %}">
    금융
  </button>
</div>

<!-- Total count -->
<p class="text-[15px] text-gray-500 mb-3">총 {{ total_count }}건</p>

<!-- Contact list -->
<div id="contact-list">
  {% include "contacts/partials/contact_list_items.html" %}
</div>
