{% if contacts %}
<div class="bg-white rounded-xl border border-gray-200 shadow-lg overflow-hidden max-h-60 overflow-y-auto">
  {% for contact in contacts %}
  <button type="button"
          class="w-full flex items-center gap-3 px-4 py-3 hover:bg-gray-50 active:bg-gray-100 transition text-left border-b border-gray-50 last:border-b-0"
          onclick="selectContact('{{ contact.pk }}', '{{ contact.name }}{% if contact.company_name %} ({{ contact.company_name }}){% endif %}')">
    <div class="w-8 h-8 bg-primary/10 rounded-full flex items-center justify-center flex-shrink-0">
      <span class="text-xs font-bold text-primary">{{ contact.name|first }}</span>
    </div>
    <div class="min-w-0">
      <p class="text-sm font-medium text-gray-900 truncate">{{ contact.name }}</p>
      {% if contact.company_name %}
      <p class="text-xs text-gray-400 truncate">{{ contact.company_name }}</p>
      {% endif %}
    </div>
  </button>
  {% endfor %}
</div>
{% endif %}
