<form hx-post="{% url 'contacts:interaction_edit' contact.pk interaction.pk %}"
      hx-target="#interaction-timeline" hx-swap="innerHTML"
      class="bg-white rounded-2xl border border-primary/30 shadow-sm p-4 mb-2">
  {% csrf_token %}
  <div class="space-y-3">
    <div>
      <label class="text-xs text-gray-500">유형</label>
      <select name="type" class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2 mt-1">
        <option value="memo" {% if interaction.type == 'memo' %}selected{% endif %}>메모</option>
        <option value="call" {% if interaction.type == 'call' %}selected{% endif %}>통화</option>
        <option value="meeting" {% if interaction.type == 'meeting' %}selected{% endif %}>미팅</option>
        <option value="message" {% if interaction.type == 'message' %}selected{% endif %}>메시지</option>
      </select>
    </div>
    <div>
      <label class="text-xs text-gray-500">내용</label>
      <textarea name="summary" rows="3"
                class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2 mt-1 focus:outline-none focus:ring-1 focus:ring-primary"
                required>{{ interaction.summary }}</textarea>
    </div>
    <div class="flex justify-end gap-2">
      <a href="{% url 'contacts:detail' contact.pk %}"
         hx-get="{% url 'contacts:detail' contact.pk %}"
         hx-target="#main-content" hx-push-url="true"
         class="px-3 py-1.5 text-sm text-gray-500 hover:text-gray-700">취소</a>
      <button type="submit" class="px-4 py-1.5 bg-primary text-white text-sm font-semibold rounded-lg">저장</button>
    </div>
  </div>
</form>
