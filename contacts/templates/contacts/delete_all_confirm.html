{% extends request.htmx|yesno:"common/base_partial.html,common/base.html" %}

{% block content %}
<div class="px-4 pt-6">
  <div class="flex items-center gap-3 mb-5">
    <a href="{% url 'contacts:list' %}" hx-get="{% url 'contacts:list' %}" hx-target="#main-content" hx-push-url="true" class="text-gray-500">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </a>
    <h1 class="text-xl font-bold text-red-600">연락처 일괄 삭제</h1>
  </div>

  <div class="bg-red-50 border border-red-200 rounded-2xl p-5 mb-6">
    <p class="text-sm text-red-700 font-semibold mb-1">{{ count }}건의 연락처가 모두 삭제됩니다</p>
    <p class="text-xs text-red-500">관련 접점 기록, 미팅, 브리핑도 함께 삭제됩니다. 이 작업은 되돌릴 수 없습니다.</p>
  </div>

  <form method="post" action="{% url 'contacts:delete_all' %}">
    {% csrf_token %}
    <div class="flex gap-3">
      <a href="{% url 'contacts:list' %}" hx-get="{% url 'contacts:list' %}" hx-target="#main-content" hx-push-url="true"
         class="flex-1 border border-gray-200 text-gray-700 font-semibold py-3 rounded-xl text-sm text-center">취소</a>
      <button type="submit" class="flex-1 bg-red-600 text-white font-semibold py-3 rounded-xl text-sm hover:bg-red-700 transition">전체 삭제</button>
    </div>
  </form>
</div>
{% endblock %}
