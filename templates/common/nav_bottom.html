<script>
(function() {
  function updateBottomNav() {
    var path = window.location.pathname;
    document.querySelectorAll('.nav-tab').forEach(function(tab) {
      var key = tab.dataset.nav;
      var active = (key === 'dashboard' && (path === '/' || path.startsWith('/dashboard'))) ||
                   (key === 'candidates' && path.startsWith('/candidates')) ||
                   (key === 'projects' && path.startsWith('/projects')) ||
                   (key === 'clients' && path.startsWith('/clients')) ||
                   (key === 'settings' && path.includes('/settings'));
      tab.classList.remove('text-ink3', 'text-slate-400');
      tab.classList.add(active ? 'text-ink3' : 'text-slate-400');
    });
  }
  updateBottomNav();
  document.body.addEventListener('htmx:pushedIntoHistory', updateBottomNav);
  document.body.addEventListener('htmx:replacedInHistory', updateBottomNav);
})();
</script>
