<!-- Brief card for embedding in contact detail / dashboard -->
<div class="bg-white rounded-2xl border border-gray-100 p-4">
  <p class="text-sm text-gray-700 mb-2">{{ brief.company_analysis|truncatewords:30 }}</p>
  <p class="text-sm text-primary font-medium">{{ brief.action_suggestion|truncatewords:20 }}</p>
  <div class="flex items-center justify-between mt-3">
    <p class="text-xs text-gray-500">방금 생성됨</p>
    <a href="{% url 'intelligence:brief_detail' contact.pk %}"
       hx-get="{% url 'intelligence:brief_detail' contact.pk %}" hx-target="#main-content" hx-push-url="true"
       class="text-xs font-semibold text-primary">자세히 &gt;</a>
  </div>
</div>
<script>
  (function(){
    var t = document.getElementById('toast-container');
    if (t) {
      t.innerHTML = '<div class="bg-gray-900 text-white px-5 py-3 rounded-xl text-sm shadow-lg">AI 브리핑이 생성되었습니다</div>';
      setTimeout(function(){ t.innerHTML = ''; }, 3000);
    }
  })();
</script>
